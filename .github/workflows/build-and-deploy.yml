name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - api
          - user-ui
          - admin-ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:${{ github.sha || github.ref_name }}
          labels: |
            org.opencontainers.image.title=${{ matrix.service }}
            org.opencontainers.image.description=Portfolio MCS - ${{ matrix.service }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update image references
        run: |
          IMAGE_TAG=${{ github.sha }}
          sed -i "s|image: portfolio-mcs-api:latest|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:$IMAGE_TAG|g" k8s/api/01-deployment.yaml
          sed -i "s|image: portfolio-mcs-user-ui:latest|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-user-ui:$IMAGE_TAG|g" k8s/user-ui/01-deployment.yaml
          sed -i "s|image: portfolio-mcs-admin-ui:latest|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-admin-ui:$IMAGE_TAG|g" k8s/admin-ui/01-deployment.yaml

      - name: Verify Kubernetes connectivity
        run: kubectl cluster-info

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl apply -f k8s/01-configmap.yaml
          kubectl apply -f k8s/secrets/01-secrets.yaml
          kubectl apply -f k8s/db/
          kubectl apply -f k8s/api/
          kubectl apply -f k8s/user-ui/
          kubectl apply -f k8s/admin-ui/
          kubectl apply -f k8s/02-policies.yaml
          kubectl apply -f k8s/ingress/
          
          echo "Waiting for rollout..."
          kubectl rollout status deployment/portfolio-api -n portfolio --timeout=5m
          kubectl rollout status deployment/portfolio-user-ui -n portfolio --timeout=5m
          kubectl rollout status deployment/portfolio-admin-ui -n portfolio --timeout=5m

      - name: Verify deployment
        run: kubectl get all -n portfolio

      - name: Check application health
        run: |
          kubectl port-forward svc/portfolio-api 4000:4000 -n portfolio &
          sleep 2
          curl -f http://localhost:4000/api/health || exit 1
