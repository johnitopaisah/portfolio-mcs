# ============================================================
#  Admin UI — CI Pipeline
#
#  Stages:  validate → quality (lint + typecheck) → build → push → summary
#
#  Image: ghcr.io/johnitopaisah/portfolio-mcs/admin-ui:<tag>
#  Runtime: node:20-alpine  |  Next.js 14.2.29 standalone
#
#  Required GitHub Variables:
#    NEXT_PUBLIC_API_URL   e.g. https://api.johnisah.com
#    INTERNAL_API_URL      e.g. http://api-service:4000
#    IMAGE_REGISTRY_BASE   e.g. ghcr.io/johnitopaisah/portfolio-mcs
# ============================================================

name: Admin UI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag  e.g. v1.0.0 | v1.0.0-rc | v1.0.0-rc1"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write         # write needed for manifest update commit
  packages: write
  security-events: write  # upload Trivy SARIF to GitHub Security tab

env:
  IMAGE:    ${{ vars.IMAGE_REGISTRY_BASE }}/admin-ui
  NODE_VER: "20"

jobs:

  # ── 1. Validate tag ──────────────────────────────────────
  validate:
    name: Validate tag
    uses: ./.github/workflows/_validate-tag.yml
    with:
      tag: ${{ inputs.tag }}

  # ── 2. Lint & type-check ─────────────────────────────────
  quality:
    name: Lint & typecheck
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required GitHub Variables are set
        run: |
          MISSING=0
          [ -z "${{ vars.NEXT_PUBLIC_API_URL }}" ]   && echo "❌ NEXT_PUBLIC_API_URL not set"  && MISSING=1
          [ -z "${{ vars.INTERNAL_API_URL }}" ]       && echo "❌ INTERNAL_API_URL not set"    && MISSING=1
          [ -z "${{ vars.IMAGE_REGISTRY_BASE }}" ]    && echo "❌ IMAGE_REGISTRY_BASE not set" && MISSING=1
          [ $MISSING -eq 0 ] && echo "✅ All required GitHub Variables are set"
          exit $MISSING

      - name: Setup Node ${{ env.NODE_VER }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VER }}
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Check required pages exist
        run: |
          echo "── Checking page structure ──"
          for f in \
            src/app/page.tsx \
            src/app/layout.tsx \
            src/app/globals.css \
            src/app/login/page.tsx \
            src/app/forgot-password/page.tsx \
            src/app/reset-password/page.tsx \
            src/app/dashboard/page.tsx \
            src/app/dashboard/layout.tsx \
            src/app/dashboard/projects/page.tsx \
            src/app/dashboard/skills/page.tsx \
            src/app/dashboard/experience/page.tsx \
            src/app/dashboard/certifications/page.tsx \
            src/app/dashboard/messages/page.tsx \
            src/app/dashboard/profile/page.tsx \
            src/app/jobs/page.tsx \
            src/components/Sidebar.tsx \
            src/lib/api.ts; do
            test -f "$f" && echo "✅ $f" || (echo "❌ Missing: $f" && exit 1)
          done

      - name: Check no hardcoded localhost in source
        run: |
          if grep -r "localhost:4000" src/ --include="*.ts" --include="*.tsx" -l 2>/dev/null; then
            echo "❌ Found hardcoded localhost:4000 — must use env var"
            exit 1
          fi
          echo "✅ No hardcoded localhost found"

      - name: Check robots.txt blocks search engines
        run: |
          test -f public/robots.txt || (echo "❌ public/robots.txt missing" && exit 1)
          grep -q "Disallow: /" public/robots.txt \
            && echo "✅ robots.txt blocks crawlers" \
            || (echo "❌ robots.txt must contain 'Disallow: /'" && exit 1)

  # ── 3. Build & push ──────────────────────────────────────
  build-push:
    name: Build & push
    needs: [validate, quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context:    ./admin-ui
          push:       true
          provenance: false
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            INTERNAL_API_URL=${{ vars.INTERNAL_API_URL }}
          tags: |
            ${{ vars.IMAGE_REGISTRY_BASE }}/admin-ui:${{ needs.validate.outputs.tag }}
            ${{ vars.IMAGE_REGISTRY_BASE }}/admin-ui:latest
          cache-from: type=gha,scope=admin-ui
          cache-to:   type=gha,scope=admin-ui,mode=max

  # ── 4. Trivy image scan ──────────────────────────────────
  scan:
    name: Scan image
    needs: [validate, build-push]
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ vars.IMAGE_REGISTRY_BASE }}/admin-ui:${{ needs.validate.outputs.tag }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: admin-ui/.trivyignore

      - name: Run Trivy vulnerability scanner (SARIF report)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ vars.IMAGE_REGISTRY_BASE }}/admin-ui:${{ needs.validate.outputs.tag }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
          trivyignores: admin-ui/.trivyignore

      - name: Upload results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ── 5. Update manifest ───────────────────────────────────
  update-manifest:
    name: Update k8s manifest
    needs: [validate, scan]
    runs-on: ubuntu-latest
    if: needs.scan.result == 'success'
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in manifest
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          BASE="ghcr.io/johnitopaisah/portfolio-mcs"
          sed -i "s|${BASE}/admin-ui:.*|${BASE}/admin-ui:${TAG}|g" k8s/admin-ui/deployment.yaml
          echo "✅ k8s/admin-ui/deployment.yaml → ${BASE}/admin-ui:${TAG}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ needs.validate.outputs.tag }}"
          git add k8s/admin-ui/deployment.yaml
          git diff --cached --quiet && echo "No manifest change needed" && exit 0
          git commit -m "chore: bump admin-ui image to ${TAG} [skip ci]"
          PUSHED=false
          for i in 1 2 3 4 5; do
            git pull --rebase origin develop && git push origin develop && { PUSHED=true; break; }
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
          [ "$PUSHED" = "true" ] || { echo "❌ Failed to push after 5 attempts"; exit 1; }
          echo "✅ Manifest updated — ArgoCD will sync shortly"

  # ── 6. Summary ───────────────────────────────────────────
  summary:
    name: Summary
    needs: [validate, quality, build-push, scan, update-manifest]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write summary
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          QUALITY="${{ needs.quality.result }}"
          BUILD="${{ needs.build-push.result }}"
          SCAN="${{ needs.scan.result }}"
          MANIFEST="${{ needs.update-manifest.result }}"
          ok() { [ "$1" = "success" ] && echo "✅" || ( [ "$1" = "skipped" ] && echo "⏭️" || echo "❌" ); }
          echo "## Admin UI pipeline" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & typecheck | $(ok $QUALITY) $QUALITY |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & push     | $(ok $BUILD) $BUILD |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy scan       | $(ok $SCAN) $SCAN |" >> $GITHUB_STEP_SUMMARY
          echo "| Update manifest  | $(ok $MANIFEST) $MANIFEST |" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ vars.IMAGE_REGISTRY_BASE }}/admin-ui:$TAG\`" >> $GITHUB_STEP_SUMMARY
