# ============================================================
#  API — CI Pipeline
#  Stages: validate → lint → build → push → summary
# ============================================================

name: API

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag  e.g. v1.0.0 | v1.0.0-rc"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write         # write needed for manifest update commit
  packages: write
  security-events: write  # upload Trivy SARIF to GitHub Security tab

env:
  IMAGE:    ${{ vars.IMAGE_REGISTRY_BASE }}/api
  NODE_VER: "20"

jobs:
  validate:
    name: Validate tag
    uses: ./.github/workflows/_validate-tag.yml
    with:
      tag: ${{ inputs.tag }}

  lint:
    name: Lint & audit
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Verify IMAGE_REGISTRY_BASE is set
        run: |
          [ -z "${{ vars.IMAGE_REGISTRY_BASE }}" ] \
            && echo "❌ IMAGE_REGISTRY_BASE not set" && exit 1 \
            || echo "✅ IMAGE_REGISTRY_BASE=${{ vars.IMAGE_REGISTRY_BASE }}"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VER }}
          cache: npm
          cache-dependency-path: api/package-lock.json

      - run: npm install

      - name: Check required source files exist
        run: |
          echo "── Checking source structure ──"
          for f in \
            src/index.js \
            src/db/client.js \
            src/middleware/auth.js \
            src/middleware/errorHandler.js \
            src/routes/auth.js \
            src/routes/profile.js \
            src/routes/projects.js \
            src/routes/skills.js \
            src/routes/experiences.js \
            src/routes/certifications.js \
            src/routes/contact.js \
            src/routes/visitors.js \
            src/routes/jobs.js \
            src/routes/admin/jobs.js \
            src/services/notify.js \
            src/services/geoip.js \
            src/services/parseVisitor.js \
            src/services/visitorDigest.js \
            src/services/jobIngestion/jobIngestionService.js \
            src/services/jobIngestion/aiFilteringService.js \
            src/services/jobIngestion/notificationService.js \
            src/services/jobIngestion/config.js \
            src/services/jobIngestion/deduplicationService.js \
            src/services/jobIngestion/ingestionLogsService.js \
            src/workers/jobWorker.js; do
            test -f "$f" && echo "✅ $f" || (echo "❌ Missing: $f" && exit 1)
          done

      - name: Security audit (high severity only)
        run: npm audit --audit-level=high --omit=dev

      - name: Check no placeholder secrets in source
        run: |
          BAD=0
          for PAT in "changeme" "REPLACE_THIS" "your-secret-here"; do
            if grep -r "$PAT" src/ --include="*.js" -l 2>/dev/null; then
              echo "❌ Found placeholder '$PAT'"; BAD=1
            fi
          done
          [ $BAD -eq 0 ] && echo "✅ No placeholders found"
          exit $BAD

  build-push:
    name: Build & push
    needs: [validate, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context:    ./api
          push:       true
          provenance: false
          tags: |
            ${{ vars.IMAGE_REGISTRY_BASE }}/api:${{ needs.validate.outputs.tag }}
            ${{ vars.IMAGE_REGISTRY_BASE }}/api:latest
          cache-from: type=gha,scope=api
          cache-to:   type=gha,scope=api,mode=max

  # ── 4. Trivy image scan ──────────────────────────────────
  scan:
    name: Scan image
    needs: [validate, build-push]
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ vars.IMAGE_REGISTRY_BASE }}/api:${{ needs.validate.outputs.tag }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: api/.trivyignore

      - name: Upload results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ── 5. Update manifest ───────────────────────────────────
  update-manifest:
    name: Update k8s manifest
    needs: [validate, scan]
    runs-on: ubuntu-latest
    if: needs.scan.result == 'success'
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in manifest
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          BASE="ghcr.io/johnitopaisah/portfolio-mcs"
          sed -i "s|${BASE}/api:.*|${BASE}/api:${TAG}|g" k8s/api/deployment.yaml
          echo "✅ k8s/api/deployment.yaml → ${BASE}/api:${TAG}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ needs.validate.outputs.tag }}"
          git add k8s/api/deployment.yaml
          git diff --cached --quiet && echo "No manifest change needed" && exit 0
          git commit -m "chore: bump api image to ${TAG} [skip ci]"
          PUSHED=false
          for i in 1 2 3 4 5; do
            git pull --rebase origin develop && git push origin develop && { PUSHED=true; break; }
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
          [ "$PUSHED" = "true" ] || { echo "❌ Failed to push after 5 attempts"; exit 1; }
          echo "✅ Manifest updated — ArgoCD will sync shortly"

  # ── 6. Summary ───────────────────────────────────────────
  summary:
    name: Summary
    needs: [validate, lint, build-push, scan, update-manifest]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write summary
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          LINT="${{ needs.lint.result }}"
          BUILD="${{ needs.build-push.result }}"
          SCAN="${{ needs.scan.result }}"
          MANIFEST="${{ needs.update-manifest.result }}"
          ok() { [ "$1" = "success" ] && echo "✅" || ( [ "$1" = "skipped" ] && echo "⏭️" || echo "❌" ); }
          echo "## API pipeline" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & audit    | $(ok $LINT) $LINT |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & push    | $(ok $BUILD) $BUILD |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy scan      | $(ok $SCAN) $SCAN |" >> $GITHUB_STEP_SUMMARY
          echo "| Update manifest | $(ok $MANIFEST) $MANIFEST |" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ vars.IMAGE_REGISTRY_BASE }}/api:$TAG\`" >> $GITHUB_STEP_SUMMARY
