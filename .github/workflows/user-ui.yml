# ============================================================
#  User UI — CI Pipeline
#
#  Stages:  validate → quality (lint + typecheck) → build → push → summary
#
#  Trigger:
#    - Manual (workflow_dispatch) — run this pipeline alone
#    - Called  (workflow_call)    — triggered by all-services.yml
#
#  Image: ghcr.io/johnitopaisah/portfolio-mcs/user-ui:<tag>
#  Runtime: node:20-alpine  |  Next.js 14.2.3 standalone
#
#  Required GitHub Variables (Settings → Secrets and variables → Variables):
#    NEXT_PUBLIC_API_URL   e.g. https://api.johnisah.com
#    INTERNAL_API_URL      e.g. http://api-service:4000
#    IMAGE_REGISTRY_BASE   e.g. ghcr.io/johnitopaisah/portfolio-mcs
# ============================================================

name: User UI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag  e.g. v1.0.0 | v1.0.0-rc | v1.0.0-rc1"
        required: true
        type: string

  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE:    ${{ vars.IMAGE_REGISTRY_BASE }}/user-ui
  NODE_VER: "20"

jobs:

  # ── 1. Validate tag ──────────────────────────────────────
  validate:
    name: Validate tag
    uses: ./.github/workflows/_validate-tag.yml
    with:
      tag: ${{ inputs.tag }}

  # ── 2. Lint & type-check ─────────────────────────────────
  quality:
    name: Lint & typecheck
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required GitHub Variables are set
        run: |
          MISSING=0
          [ -z "${{ vars.NEXT_PUBLIC_API_URL }}" ]   && echo "❌ GitHub Variable NEXT_PUBLIC_API_URL is not set"  && MISSING=1
          [ -z "${{ vars.INTERNAL_API_URL }}" ]       && echo "❌ GitHub Variable INTERNAL_API_URL is not set"    && MISSING=1
          [ -z "${{ vars.IMAGE_REGISTRY_BASE }}" ]    && echo "❌ GitHub Variable IMAGE_REGISTRY_BASE is not set" && MISSING=1
          [ $MISSING -eq 0 ] && echo "✅ All required GitHub Variables are set"
          exit $MISSING

      - name: Setup Node ${{ env.NODE_VER }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VER }}
          cache: npm
          cache-dependency-path: user-ui/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Check required components exist
        run: |
          echo "── Checking component structure ──"
          for f in \
            src/app/page.tsx \
            src/app/layout.tsx \
            src/app/globals.css \
            src/lib/api.ts \
            src/components/Navbar.tsx \
            src/components/HeroSection.tsx \
            src/components/ProjectsSection.tsx \
            src/components/SkillsSection.tsx \
            src/components/ExperienceSection.tsx \
            src/components/CertificationsSection.tsx \
            src/components/ContactSection.tsx; do
            test -f "$f" && echo "✅ $f" || (echo "❌ Missing: $f" && exit 1)
          done

      - name: Check NEXT_PUBLIC_API_URL is not hardcoded to localhost
        run: |
          echo "── Scanning for hardcoded localhost ──"
          if grep -r "localhost:4000" src/ --include="*.ts" --include="*.tsx" -l 2>/dev/null; then
            echo "⚠️  Found hardcoded localhost:4000 — should come from env var"
            exit 1
          fi
          echo "✅  No hardcoded localhost found"

  # ── 3. Build & push ──────────────────────────────────────
  build-push:
    name: Build & push
    needs: [validate, quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context:    ./user-ui
          push:       true
          provenance: false
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            INTERNAL_API_URL=${{ vars.INTERNAL_API_URL }}
          tags: |
            ${{ vars.IMAGE_REGISTRY_BASE }}/user-ui:${{ needs.validate.outputs.tag }}
            ${{ vars.IMAGE_REGISTRY_BASE }}/user-ui:latest
          cache-from: type=gha,scope=user-ui
          cache-to:   type=gha,scope=user-ui,mode=max

  # ── 4. Summary ───────────────────────────────────────────
  summary:
    name: Summary
    needs: [validate, quality, build-push]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write summary
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          QUALITY="${{ needs.quality.result }}"
          BUILD="${{ needs.build-push.result }}"

          overall() { [ "$1" = "success" ] && echo "✅" || echo "❌"; }

          echo "## User UI pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & typecheck | $(overall $QUALITY) $QUALITY |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & push     | $(overall $BUILD) $BUILD |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ vars.IMAGE_REGISTRY_BASE }}/user-ui:$TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "**API URL baked in:** \`${{ vars.NEXT_PUBLIC_API_URL }}\`" >> $GITHUB_STEP_SUMMARY
