<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#09090b"/>
    <stop offset="100%" stop-color="#0f0f13"/>
  </linearGradient>
  <linearGradient id="glowL" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="glowR" x1="1" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#a78bfa"/>
    <stop offset="100%" stop-color="#67e8f9"/>
  </linearGradient>
  <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#7c3aed"/>
    <stop offset="100%" stop-color="#06b6d4"/>
  </linearGradient>
  <!-- Violet arrow — internet to nginx -->
  <marker id="arrV" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <!-- Cyan arrow — user-ui/admin-ui → api -->
  <marker id="arrC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <!-- Green arrow — api → database -->
  <marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#86efac" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="1200" height="630" fill="url(#bg)"/>

<!-- Grid -->
<g opacity="0.035" stroke="#ffffff" stroke-width="1">
  <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
  <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
