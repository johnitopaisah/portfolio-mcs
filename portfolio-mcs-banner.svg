<text x="734" y="299" text-anchor="middle" font-family="monospace" font-size="11" fill="#7c3aed">nginx</text>
<text x="734" y="313" text-anchor="middle" font-family="monospace" font-size="10" fill="#4c1d95">ingress</text>

<!-- Arrow: nginx → api left edge -->
<line x1="788" y1="301" x2="803" y2="301"
