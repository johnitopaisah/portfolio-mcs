<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Application — {{NAME}}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11pt;
    color: #1a1a1a;
    background: #fff;
    max-width: 700px;
    margin: 0 auto;
    padding: 28px 32px;
    line-height: 1.65;
  }
  /* Email format: no formal header block, starts naturally */
  .subject-line {
    font-size: 10pt; font-weight: 700; color: {{ACCENT_COLOR}};
    margin-bottom: 20px; padding: 6px 10px;
    border-left: 3px solid {{ACCENT_COLOR}}; background: {{ACCENT_LIGHT}};
  }
  .subject-line span { font-size: 9pt; font-weight: 400; color: #666; }
  .cl-para { font-size: 11pt; color: #111; margin-bottom: 14px; line-height: 1.7; }
  .cl-para.opening { }
  .ps-line { margin-top: 18px; font-size: 10pt; color: #555; font-style: italic; }
  .signature { margin-top: 20px; border-top: 1px solid #eee; padding-top: 14px; }
  .sig-name { font-size: 12pt; font-weight: 700; color: #000; margin-bottom: 3px; }
  .sig-headline { font-size: 10pt; color: {{ACCENT_COLOR}}; margin-bottom: 4px; }
  .sig-contacts { font-size: 9pt; color: #666; display: flex; flex-wrap: wrap; gap: 3px 14px; }
  .sig-contacts a { color: #555; text-decoration: none; }
  @media print { body { padding: 0; } a { color: #555 !important; } }
</style>
</head>
<body>
<div class="subject-line">
  <span>Subject: </span>{{SUBJECT_LINE}}
</div>
<p class="cl-para opening">{{OPENING_HOOK}}</p>
<p class="cl-para">{{WHY_YOU}}</p>
<p class="cl-para">{{WHY_THEM}}</p>
<p class="cl-para">{{WHY_NOW}}</p>
<p class="cl-para">{{CALL_TO_ACTION}}</p>
{{PS_LINE}}
<div class="signature">
  <div class="sig-name">{{NAME}}</div>
  <div class="sig-headline">{{HEADLINE}}</div>
  <div class="sig-contacts">
    <a href="mailto:{{EMAIL}}">{{EMAIL}}</a>
    {{PHONE_ITEM}}
    <a href="{{LINKEDIN_URL}}" target="_blank">LinkedIn</a>
    <a href="{{GITHUB_URL}}" target="_blank">GitHub</a>
  </div>
</div>
</body>
</html>
