<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CV — {{NAME}}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Times New Roman', Times, Georgia, serif;
    font-size: 10.5pt;
    color: #000;
    background: #fff;
    max-width: 800px;
    margin: 0 auto;
    padding: 22px 32px;
    line-height: 1.4;
  }
  /* Wall Street / Finance: conservative, dense, formal */
  .header { margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1.5px solid #000; }
  .header h1 { font-size: 17pt; font-weight: 700; color: #000; letter-spacing: 0.3px; margin-bottom: 2px; }
  .header .headline { font-size: 10.5pt; color: #333; margin-bottom: 6px; }
  .header .contacts { font-size: 9pt; color: #333; display: flex; flex-wrap: wrap; gap: 3px 16px; }
  .header .contacts a { color: #000; text-decoration: none; }
  .section { margin-bottom: 12px; }
  .section-title {
    font-size: 9pt; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: #000; border-bottom: 1px solid #000;
    padding-bottom: 2px; margin-bottom: 7px;
  }
  .summary-text { font-size: 10.5pt; color: #000; line-height: 1.5; text-align: justify; }
  /* Finance CVs list skills in a dense two-col text format */
  .skills-grid { columns: 2; gap: 20px; }
  .skills-cat { break-inside: avoid; margin-bottom: 4px; }
  .skills-cat-label { font-weight: 700; font-size: 9.5pt; }
  .skills-cat-items { font-size: 9.5pt; color: #333; }
  .skills-text { font-size: 10pt; color: #111; line-height: 1.5; }
  .exp-entry { margin-bottom: 10px; }
  .exp-entry:last-child { margin-bottom: 0; }
  .exp-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1px; }
  .exp-role { font-size: 10.5pt; font-weight: 700; color: #000; }
  .exp-dates { font-size: 9.5pt; color: #333; white-space: nowrap; }
  .exp-company { font-size: 10pt; font-style: italic; color: #222; margin-bottom: 3px; }
  .exp-entry ul { margin: 0 0 0 16px; }
  .exp-entry ul li { font-size: 10pt; color: #000; margin-bottom: 1px; line-height: 1.4; }
  .edu-entry { margin-bottom: 8px; }
  .edu-header { display: flex; justify-content: space-between; align-items: baseline; }
  .edu-degree { font-size: 10.5pt; font-weight: 700; color: #000; }
  .edu-dates { font-size: 9.5pt; color: #333; }
  .edu-institution { font-size: 10pt; font-style: italic; color: #222; }
  .edu-detail { font-size: 9.5pt; color: #333; margin-top: 1px; }
  .cert-list { columns: 2; margin: 0 0 0 16px; }
  .cert-list li { font-size: 10pt; color: #000; margin-bottom: 2px; break-inside: avoid; }
  .proj-entry { margin-bottom: 8px; }
  .proj-header { display: flex; justify-content: space-between; align-items: baseline; }
  .proj-title { font-size: 10.5pt; font-weight: 700; color: #000; }
  .proj-dates { font-size: 9.5pt; color: #333; }
  .proj-tech { font-size: 9.5pt; font-style: italic; color: #333; }
  .proj-desc { font-size: 10pt; color: #000; margin-top: 2px; line-height: 1.45; }
  .ref-entry { margin-bottom: 6px; }
  .ref-name { font-weight: 700; font-size: 10.5pt; }
  .ref-detail { font-size: 10pt; color: #333; }
  @media print { body { padding: 0; } a { color: #000 !important; } }
</style>
</head>
<body>
<div class="header">
  <h1>{{NAME}}</h1>
  <div class="headline">{{HEADLINE}}</div>
  <div class="contacts">
    <a href="mailto:{{EMAIL}}">{{EMAIL}}</a>
    {{PHONE_ITEM}}
    {{LOCATION_ITEM}}
    {{WEBSITE_ITEM}}
    <a href="{{GITHUB_URL}}" target="_blank">{{GITHUB_URL}}</a>
    <a href="{{LINKEDIN_URL}}" target="_blank">{{LINKEDIN_URL}}</a>
  </div>
</div>
{{SECTION_SUMMARY}}
{{SECTION_SKILLS}}
{{SECTION_EXPERIENCE}}
{{SECTION_EDUCATION}}
{{SECTION_CERTIFICATIONS}}
{{SECTION_PROJECTS}}
{{SECTION_REFERENCES}}
</body>
</html>
