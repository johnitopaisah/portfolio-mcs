<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CV — {{NAME}}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
    font-size: 10pt;
    color: #1e1e2e;
    background: #fff;
    max-width: 820px;
    margin: 0 auto;
    line-height: 1.5;
  }
  /* Bold colored header bar */
  .header {
    background: {{ACCENT_COLOR}};
    color: #fff;
    padding: 28px 36px 22px;
  }
  .header h1 { font-size: 26pt; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
  .header .headline { font-size: 12pt; opacity: 0.9; margin-bottom: 12px; font-weight: 400; }
  .header .contacts { display: flex; flex-wrap: wrap; gap: 5px 18px; font-size: 9pt; opacity: 0.88; }
  .header .contacts a { color: #fff; text-decoration: none; }
  .body-content { padding: 24px 36px; }
  .section { margin-bottom: 18px; }
  .section-title {
    font-size: 9pt; font-weight: 700; text-transform: uppercase; letter-spacing: 1.6px;
    color: {{ACCENT_COLOR}}; padding-bottom: 4px; margin-bottom: 10px;
    border-bottom: 2px solid {{ACCENT_COLOR}};
  }
  .summary-text { font-size: 10pt; color: #2d2d3a; line-height: 1.6; }
  .skills-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .skill-tag {
    font-size: 8.5pt; padding: 3px 10px; border-radius: 14px;
    background: {{ACCENT_LIGHT}}; color: {{ACCENT_COLOR}};
    font-weight: 600; letter-spacing: 0.2px;
  }
  .exp-entry { margin-bottom: 14px; padding-left: 12px; border-left: 2px solid {{ACCENT_LIGHT}}; }
  .exp-entry:last-child { margin-bottom: 0; }
  .exp-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3px; }
  .exp-role { font-size: 10.5pt; font-weight: 700; color: #111; }
  .exp-company { font-size: 10pt; color: {{ACCENT_COLOR}}; font-weight: 500; margin-top: 1px; }
  .exp-dates { font-size: 8.5pt; color: #777; white-space: nowrap; background: {{ACCENT_LIGHT}}; padding: 2px 7px; border-radius: 8px; }
  .exp-entry ul { margin: 5px 0 0 15px; }
  .exp-entry ul li { font-size: 9.5pt; color: #333; margin-bottom: 2px; line-height: 1.5; }
  .edu-entry { margin-bottom: 10px; padding-left: 12px; border-left: 2px solid {{ACCENT_LIGHT}}; }
  .edu-meta { display: flex; justify-content: space-between; align-items: flex-start; }
  .edu-degree { font-size: 10.5pt; font-weight: 700; color: #111; }
  .edu-institution { font-size: 10pt; color: {{ACCENT_COLOR}}; }
  .edu-dates { font-size: 8.5pt; color: #777; }
  .edu-detail { font-size: 9.5pt; color: #555; margin-top: 2px; }
  .cert-list { list-style: none; margin: 0; }
  .cert-list li { font-size: 9.5pt; color: #333; padding: 4px 0; border-bottom: 1px solid #f0f0f0; }
  .cert-list li:last-child { border-bottom: none; }
  .proj-entry { margin-bottom: 10px; }
  .proj-entry:last-child { margin-bottom: 0; }
  .proj-title { font-size: 10.5pt; font-weight: 700; color: #111; }
  .proj-tech { font-size: 8.5pt; color: {{ACCENT_COLOR}}; margin-top: 1px; font-weight: 500; }
  .proj-desc { font-size: 9.5pt; color: #333; margin-top: 3px; line-height: 1.5; }
  .ref-entry { margin-bottom: 8px; font-size: 9.5pt; }
  .ref-name { font-weight: 700; color: #111; }
  .ref-detail { color: #555; }
  @media print { body {} a { color: inherit !important; } }
</style>
</head>
<body>
<div class="header">
  <h1>{{NAME}}</h1>
  <div class="headline">{{HEADLINE}}</div>
  <div class="contacts">
    <a href="mailto:{{EMAIL}}">{{EMAIL}}</a>
    {{PHONE_ITEM}}
    {{LOCATION_ITEM}}
    <a href="{{GITHUB_URL}}" target="_blank">GitHub</a>
    <a href="{{LINKEDIN_URL}}" target="_blank">LinkedIn</a>
  </div>
</div>
<div class="body-content">
{{SECTION_SUMMARY}}
{{SECTION_SKILLS}}
{{SECTION_EXPERIENCE}}
{{SECTION_EDUCATION}}
{{SECTION_CERTIFICATIONS}}
{{SECTION_PROJECTS}}
{{SECTION_REFERENCES}}
</div>
</body>
</html>
