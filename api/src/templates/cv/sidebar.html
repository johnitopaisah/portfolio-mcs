<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CV — {{NAME}}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
    font-size: 10pt;
    color: #111;
    background: #fff;
    max-width: 840px;
    margin: 0 auto;
    display: flex;
    min-height: 100vh;
    line-height: 1.5;
  }
  /* Two-column: dark sidebar left + main content right */
  .sidebar {
    width: 230px;
    min-width: 230px;
    background: {{ACCENT_COLOR}};
    padding: 28px 20px;
    color: #fff;
  }
  .sidebar h1 { font-size: 16pt; font-weight: 700; color: #fff; margin-bottom: 4px; line-height: 1.2; }
  .sidebar .headline { font-size: 9.5pt; color: rgba(255,255,255,0.8); margin-bottom: 18px; font-style: italic; }
  .sidebar .contact-block { margin-bottom: 20px; }
  .sidebar .contact-block a { color: rgba(255,255,255,0.9); text-decoration: none; font-size: 8.5pt; word-break: break-all; }
  .sidebar .contact-item { font-size: 8.5pt; color: rgba(255,255,255,0.85); margin-bottom: 4px; }
  .sidebar-section { margin-bottom: 18px; }
  .sidebar-title {
    font-size: 8pt; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
    color: rgba(255,255,255,0.6); border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 4px; margin-bottom: 8px;
  }
  .sidebar-skill { font-size: 9pt; color: rgba(255,255,255,0.9); margin-bottom: 4px; }
  .sidebar-skill-bar { height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; margin-top: 2px; }
  .sidebar-skill-fill { height: 100%; background: rgba(255,255,255,0.7); border-radius: 2px; }
  .sidebar-cert { font-size: 8.5pt; color: rgba(255,255,255,0.85); margin-bottom: 4px; line-height: 1.4; }
  .sidebar-edu { margin-bottom: 10px; }
  .sidebar-degree { font-size: 9pt; font-weight: 700; color: #fff; }
  .sidebar-institution { font-size: 8.5pt; color: rgba(255,255,255,0.75); }
  .sidebar-dates { font-size: 8pt; color: rgba(255,255,255,0.6); }
  /* Main content */
  .main {
    flex: 1;
    padding: 28px 28px;
  }
  .main-section { margin-bottom: 16px; }
  .main-section-title {
    font-size: 9pt; font-weight: 700; text-transform: uppercase; letter-spacing: 1.3px;
    color: {{ACCENT_COLOR}}; border-bottom: 2px solid {{ACCENT_COLOR}};
    padding-bottom: 3px; margin-bottom: 10px;
  }
  .summary-text { font-size: 10pt; color: #222; line-height: 1.65; }
  .exp-entry { margin-bottom: 12px; }
  .exp-entry:last-child { margin-bottom: 0; }
  .exp-header { margin-bottom: 2px; }
  .exp-role { font-size: 10.5pt; font-weight: 700; color: #111; }
  .exp-meta { display: flex; justify-content: space-between; align-items: baseline; }
  .exp-company { font-size: 9.5pt; color: {{ACCENT_COLOR}}; font-weight: 500; }
  .exp-dates { font-size: 8.5pt; color: #888; }
  .exp-entry ul { margin: 4px 0 0 15px; }
  .exp-entry ul li { font-size: 9.5pt; color: #333; margin-bottom: 2px; line-height: 1.5; }
  .proj-entry { margin-bottom: 10px; }
  .proj-title { font-size: 10pt; font-weight: 700; color: #111; }
  .proj-tech { font-size: 8.5pt; color: {{ACCENT_COLOR}}; margin-top: 1px; }
  .proj-desc { font-size: 9.5pt; color: #333; margin-top: 3px; line-height: 1.5; }
  .ref-entry { margin-bottom: 7px; }
  .ref-name { font-weight: 700; font-size: 10pt; }
  .ref-detail { font-size: 9.5pt; color: #555; }
  @media print { body { display: flex; } a { color: inherit !important; } }
</style>
</head>
<body>
<!-- SIDEBAR: always shown; skills/certs/edu go here via pdfService for sidebar layout -->
<div class="sidebar">
  <h1>{{NAME}}</h1>
  <div class="headline">{{HEADLINE}}</div>
  <div class="contact-block">
    <div class="contact-item"><a href="mailto:{{EMAIL}}">{{EMAIL}}</a></div>
    {{PHONE_SIDEBAR}}
    {{LOCATION_SIDEBAR}}
    <div class="contact-item"><a href="{{GITHUB_URL}}" target="_blank">GitHub</a></div>
    <div class="contact-item"><a href="{{LINKEDIN_URL}}" target="_blank">LinkedIn</a></div>
  </div>
  {{SIDEBAR_SKILLS}}
  {{SIDEBAR_EDUCATION}}
  {{SIDEBAR_CERTIFICATIONS}}
</div>
<!-- MAIN CONTENT -->
<div class="main">
{{SECTION_SUMMARY}}
{{SECTION_EXPERIENCE}}
{{SECTION_PROJECTS}}
{{SECTION_REFERENCES}}
</div>
</body>
</html>
