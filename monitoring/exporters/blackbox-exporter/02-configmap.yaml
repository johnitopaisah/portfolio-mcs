apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-exporter-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: blackbox-exporter
    app.kubernetes.io/part-of: portfolio-monitoring
    app.kubernetes.io/component: exporter
    app.kubernetes.io/managed-by: argocd
data:
  blackbox.yml: |
    modules:
      # Used for all four public targets — probes the full external path
      # (DNS -> TCP -> TLS handshake -> HTTP response), which also yields
      # probe_ssl_earliest_cert_expiry for the TLS-expiry alerts/dashboard.
      http_2xx:
        prober: http
        timeout: 10s
        http:
          method: GET
          valid_status_codes: [200, 201, 202, 203, 204, 301, 302, 304]
          preferred_ip_protocol: ip4
          tls_config:
            insecure_skip_verify: false
