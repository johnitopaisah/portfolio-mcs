apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-exporter
  namespace: monitoring
  labels:
    app: blackbox-exporter
    app.kubernetes.io/name: blackbox-exporter
    app.kubernetes.io/part-of: portfolio-monitoring
    app.kubernetes.io/component: exporter
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blackbox-exporter
  template:
    metadata:
      labels:
        app: blackbox-exporter
        app.kubernetes.io/name: blackbox-exporter
        app.kubernetes.io/part-of: portfolio-monitoring
        app.kubernetes.io/component: exporter
    spec:
      serviceAccountName: blackbox-exporter
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: blackbox-exporter
          image: prom/blackbox-exporter:v0.25.0
          args:
            - --config.file=/etc/blackbox_exporter/blackbox.yml
          ports:
            - name: http
              containerPort: 9115
              protocol: TCP
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/blackbox_exporter
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9115
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/healthy
              port: 9115
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: blackbox-exporter-config
