apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: monitoring
  labels:
    app: node-exporter   # Prometheus's SD relabel_config matches on this
                         # plain "app" service label, not the app.kubernetes.io/*
                         # convention below — without it, service discovery
                         # keeps zero endpoints and this target never appears.
    app.kubernetes.io/name: node-exporter
    app.kubernetes.io/part-of: portfolio-monitoring
    app.kubernetes.io/component: exporter
    app.kubernetes.io/managed-by: argocd
spec:
  # ClusterIP None — headless so Prometheus can discover individual node IPs
  clusterIP: None
  selector:
    app: node-exporter
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
      protocol: TCP
