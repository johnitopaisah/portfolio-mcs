# Read-only, cluster-wide access to InfisicalSecret status — the operator
# itself lives outside this repo (its own `infisical` namespace/controller),
# so there's no first-party /metrics endpoint here to scrape. This checker
# is the concrete stand-in: it doesn't depend on the operator's internals,
# only on the CRD's standard status.conditions shape.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infisical-secret-checker
  labels:
    app.kubernetes.io/name: infisical-secret-checker
    app.kubernetes.io/part-of: portfolio-monitoring
    app.kubernetes.io/managed-by: argocd
rules:
  - apiGroups: ["secrets.infisical.com"]
    resources: ["infisicalsecrets"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infisical-secret-checker
  labels:
    app.kubernetes.io/name: infisical-secret-checker
    app.kubernetes.io/part-of: portfolio-monitoring
    app.kubernetes.io/managed-by: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: infisical-secret-checker
subjects:
  - kind: ServiceAccount
    name: infisical-secret-checker
    namespace: monitoring
