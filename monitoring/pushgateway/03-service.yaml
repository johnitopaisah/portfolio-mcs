apiVersion: v1
kind: Service
metadata:
  name: pushgateway
  namespace: monitoring
  labels:
    app.kubernetes.io/name: pushgateway
    app.kubernetes.io/part-of: portfolio-monitoring
    app.kubernetes.io/component: metrics
    app.kubernetes.io/managed-by: argocd
spec:
  type: ClusterIP
  selector:
    app: pushgateway
  ports:
    - name: http
      port: 9091
      targetPort: 9091
      protocol: TCP
