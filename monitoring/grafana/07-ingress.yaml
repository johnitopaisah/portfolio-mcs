# Grafana public ingress — grafana.johnisah.com
#
# DNS PREREQUISITE (do before applying):
#   Add an A record in Cloudflare:
#     Name: grafana
#     Value: <same IP as johnisah.com>
#   Get IP: kubectl get svc -n kube-system | grep traefik
#
# Authentication: Grafana's own login page (GF_AUTH_ANONYMOUS_ENABLED=false)
# TLS: auto-provisioned by cert-manager (letsencrypt-prod)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: portfolio-monitoring
    app.kubernetes.io/component: visualization
    app.kubernetes.io/managed-by: argocd
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: 'true'
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - grafana.johnisah.com
      secretName: grafana-tls
  rules:
    - host: grafana.johnisah.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
