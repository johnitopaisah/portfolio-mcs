apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: portfolio-monitoring
    app.kubernetes.io/component: visualization
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: portfolio-monitoring
        app.kubernetes.io/component: visualization
    spec:
      serviceAccountName: grafana
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472

      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 472:472 /var/lib/grafana"]
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
          securityContext:
            runAsUser: 0
            runAsNonRoot: false

      containers:
        - name: grafana
          image: grafana/grafana:10.4.1
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-secret
                  key: GRAFANA_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-secret
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_SECURITY_DISABLE_GRAVATAR
              value: "true"
            - name: GF_SECURITY_COOKIE_SECURE
              value: "true"
            - name: GF_SECURITY_COOKIE_SAMESITE
              value: "strict"
            - name: GF_SECURITY_STRICT_TRANSPORT_SECURITY
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "false"
            - name: GF_SECURITY_ALLOW_EMBEDDING
              value: "true"
            - name: GF_SERVER_DOMAIN
              value: "grafana.johnisah.com"
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.johnisah.com"
            - name: GF_SERVER_HTTP_PORT
              value: "3000"
            - name: GF_UI_DEFAULT_THEME
              value: "dark"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
            - name: GF_PATHS_PROVISIONING
              value: "/etc/grafana/provisioning"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: "/var/lib/grafana/dashboards/01-system-overview.json"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            # All 13 dashboard ConfigMaps are combined into one projected
            # volume mounted as a directory (no subPath). subPath mounts are
            # bound to the ConfigMap's content at pod-creation time and never
            # refresh — every dashboard edit would silently require a manual
            # pod restart to take effect. A directory-mounted projected
            # volume uses the normal ConfigMap auto-refresh path instead
            # (kubelet syncs it periodically), so dashboard edits show up
            # without restarting Grafana.
            - name: dashboard-files
              mountPath: /var/lib/grafana/dashboards

      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-files
          projected:
            sources:
              - configMap:
                  name: grafana-dashboard-01-overview
              - configMap:
                  name: grafana-dashboard-02-api
              - configMap:
                  name: grafana-dashboard-03-database
              - configMap:
                  name: grafana-dashboard-04-infrastructure
              - configMap:
                  name: grafana-dashboard-05-business
              - configMap:
                  name: grafana-dashboard-06-alerts
              - configMap:
                  name: grafana-dashboard-07-visitors
              - configMap:
                  name: grafana-dashboard-08-web-api
              - configMap:
                  name: grafana-dashboard-09-job-pipeline
              - configMap:
                  name: grafana-dashboard-10-batch-jobs
              - configMap:
                  name: grafana-dashboard-11-llm
              - configMap:
                  name: grafana-dashboard-12-frontend-rum
              - configMap:
                  name: grafana-dashboard-13-external-uptime
