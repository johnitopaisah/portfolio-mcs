apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-01-overview
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: portfolio-monitoring
    app.kubernetes.io/component: visualization
    app.kubernetes.io/managed-by: argocd
    dashboard: system-overview
data:
  01-system-overview.json: |
    {
      "uid": "portfolio-overview",
      "title": "System Overview",
      "description": "Portfolio MCS — at-a-glance health for all services",
      "tags": ["portfolio-mcs", "overview"],
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1, "type": "stat", "title": "API Status",
          "gridPos": { "x": 0, "y": 0, "w": 3, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "mappings": [{ "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }],
              "thresholds": { "steps": [{ "color": "red", "value": 0 }, { "color": "green", "value": 1 }] }
            }
          },
          "targets": [{ "expr": "min(up{job=\"portfolio-api\"})", "legendFormat": "API" }]
        },
        {
          "id": 2, "type": "stat", "title": "Database Status",
          "gridPos": { "x": 3, "y": 0, "w": 3, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "mappings": [{ "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }],
              "thresholds": { "steps": [{ "color": "red", "value": 0 }, { "color": "green", "value": 1 }] }
            }
          },
          "targets": [{ "expr": "pg_up", "legendFormat": "PostgreSQL" }]
        },
        {
          "id": 3, "type": "stat", "title": "Requests / min",
          "gridPos": { "x": 6, "y": 0, "w": 3, "h": 4 },
          "options": { "colorMode": "value", "graphMode": "area" },
          "fieldConfig": { "defaults": { "unit": "reqpm", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "blue", "value": 0 }] } } },
          "targets": [{ "expr": "sum(rate(portfolio_http_requests_total[1m])) * 60", "legendFormat": "req/min" }]
        },
        {
          "id": 4, "type": "gauge", "title": "Error Rate",
          "gridPos": { "x": 9, "y": 0, "w": 3, "h": 4 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": true },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit", "min": 0, "max": 0.2,
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 0.02 }, { "color": "red", "value": 0.05 }] }
            }
          },
          "targets": [{ "expr": "sum(rate(portfolio_http_requests_total{status_code=~\"5..\"}[5m])) / sum(rate(portfolio_http_requests_total[5m]))", "legendFormat": "5xx rate" }]
        },
        {
          "id": 5, "type": "gauge", "title": "p95 Latency",
          "gridPos": { "x": 12, "y": 0, "w": 3, "h": 4 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": true },
          "fieldConfig": {
            "defaults": {
              "unit": "s", "min": 0, "max": 2,
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 0.25 }, { "color": "red", "value": 0.5 }] }
            }
          },
          "targets": [{ "expr": "histogram_quantile(0.95, sum(rate(portfolio_http_request_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p95" }]
        },
        {
          "id": 6, "type": "gauge", "title": "Node CPU %",
          "gridPos": { "x": 15, "y": 0, "w": 3, "h": 4 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit", "min": 0, "max": 1,
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 0.70 }, { "color": "red", "value": 0.90 }] }
            }
          },
          "targets": [{ "expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))", "legendFormat": "CPU" }]
        },
        {
          "id": 7, "type": "gauge", "title": "Node Memory %",
          "gridPos": { "x": 18, "y": 0, "w": 3, "h": 4 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit", "min": 0, "max": 1,
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 0.75 }, { "color": "red", "value": 0.90 }] }
            }
          },
          "targets": [{ "expr": "1 - (avg(node_memory_MemAvailable_bytes) / avg(node_memory_MemTotal_bytes))", "legendFormat": "Memory" }]
        },
        {
          "id": 8, "type": "gauge", "title": "Disk Usage %",
          "gridPos": { "x": 21, "y": 0, "w": 3, "h": 4 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit", "min": 0, "max": 1,
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 0.70 }, { "color": "red", "value": 0.90 }] }
            }
          },
          "targets": [{ "expr": "1 - min(node_filesystem_avail_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"})", "legendFormat": "Disk" }]
        },
        {
          "id": 9, "type": "timeseries", "title": "Request Rate over Time",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "reqps", "color": { "mode": "palette-classic" } } },
          "targets": [
            { "expr": "sum(rate(portfolio_http_requests_total{status_code=~\"2..\"}[1m]))", "legendFormat": "2xx" },
            { "expr": "sum(rate(portfolio_http_requests_total{status_code=~\"4..\"}[1m]))", "legendFormat": "4xx" },
            { "expr": "sum(rate(portfolio_http_requests_total{status_code=~\"5..\"}[1m]))", "legendFormat": "5xx" }
          ]
        },
        {
          "id": 10, "type": "timeseries", "title": "API Latency Percentiles",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "s", "color": { "mode": "palette-classic" } } },
          "targets": [
            { "expr": "histogram_quantile(0.50, sum(rate(portfolio_http_request_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p50" },
            { "expr": "histogram_quantile(0.95, sum(rate(portfolio_http_request_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p95" },
            { "expr": "histogram_quantile(0.99, sum(rate(portfolio_http_request_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p99" }
          ]
        },
        {
          "id": 11, "type": "stat", "title": "Container Restarts (24h)",
          "gridPos": { "x": 0, "y": 12, "w": 6, "h": 4 },
          "options": { "colorMode": "background" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] }
            }
          },
          "targets": [{ "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"portfolio\"}[24h]))", "legendFormat": "Restarts" }]
        },
        {
          "id": 12, "type": "stat", "title": "DB Connections",
          "gridPos": { "x": 6, "y": 12, "w": 6, "h": 4 },
          "options": { "colorMode": "value" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 50 }, { "color": "red", "value": 80 }] }
            }
          },
          "targets": [{ "expr": "sum(pg_stat_database_numbackends)", "legendFormat": "Connections" }]
        },
        {
          "id": 13, "type": "stat", "title": "API In-Flight Requests",
          "gridPos": { "x": 12, "y": 12, "w": 6, "h": 4 },
          "options": { "colorMode": "value" },
          "fieldConfig": { "defaults": { "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 20 }, { "color": "red", "value": 50 }] } } },
          "targets": [{ "expr": "portfolio_http_requests_in_flight", "legendFormat": "In-flight" }]
        },
        {
          "id": 14, "type": "stat", "title": "Running Pods",
          "gridPos": { "x": 18, "y": 12, "w": 6, "h": 4 },
          "options": { "colorMode": "value" },
          "fieldConfig": { "defaults": { "thresholds": { "steps": [{ "color": "red", "value": 0 }, { "color": "yellow", "value": 3 }, { "color": "green", "value": 5 }] } } },
          "targets": [{ "expr": "count(kube_pod_status_phase{namespace=\"portfolio\",phase=\"Running\"})", "legendFormat": "Running" }]
        }
      ],
      "schemaVersion": 38,
      "version": 1
    }
