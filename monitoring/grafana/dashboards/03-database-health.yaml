apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-03-database
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: portfolio-monitoring
    app.kubernetes.io/component: visualization
    app.kubernetes.io/managed-by: argocd
    dashboard: database-health
data:
  03-database-health.json: |
    {
      "uid": "portfolio-db-health",
      "title": "Database Health",
      "description": "PostgreSQL internals — connections, cache, query performance, table health",
      "tags": ["portfolio-mcs", "database"],
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1, "type": "gauge", "title": "Active Connections",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 6 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": true },
          "fieldConfig": {
            "defaults": {
              "min": 0, "max": 100,
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 50 }, { "color": "red", "value": 80 }] }
            }
          },
          "targets": [{ "expr": "sum(pg_stat_database_numbackends{datname=\"portfolio_db\"})", "legendFormat": "connections" }]
        },
        {
          "id": 2, "type": "gauge", "title": "Cache Hit Ratio",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 6 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": true },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit", "min": 0, "max": 1,
              "thresholds": { "steps": [{ "color": "red", "value": 0 }, { "color": "yellow", "value": 0.90 }, { "color": "green", "value": 0.95 }] }
            }
          },
          "targets": [{
            "expr": "sum(pg_stat_database_blks_hit{datname=\"portfolio_db\"}) / (sum(pg_stat_database_blks_hit{datname=\"portfolio_db\"}) + sum(pg_stat_database_blks_read{datname=\"portfolio_db\"}) + 1)",
            "legendFormat": "cache hit ratio"
          }]
        },
        {
          "id": 3, "type": "stat", "title": "Transactions / sec",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 6 },
          "options": { "colorMode": "value", "graphMode": "area" },
          "fieldConfig": { "defaults": { "unit": "ops", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "blue", "value": 0 }] } } },
          "targets": [{
            "expr": "sum(rate(pg_stat_database_xact_commit{datname=\"portfolio_db\"}[1m]) + rate(pg_stat_database_xact_rollback{datname=\"portfolio_db\"}[1m]))",
            "legendFormat": "TPS"
          }]
        },
        {
          "id": 4, "type": "stat", "title": "Database Size",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 6 },
          "options": { "colorMode": "value" },
          "fieldConfig": { "defaults": { "unit": "bytes", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 536870912 }, { "color": "red", "value": 1073741824 }] } } },
          "targets": [{ "expr": "pg_database_size_bytes{datname=\"portfolio_db\"}", "legendFormat": "Size" }]
        },
        {
          "id": 5, "type": "timeseries", "title": "Connections over Time",
          "gridPos": { "x": 0, "y": 6, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "none", "color": { "mode": "palette-classic" } } },
          "targets": [
            { "expr": "sum(pg_stat_database_numbackends{datname=\"portfolio_db\"})", "legendFormat": "Active connections" },
            { "expr": "sum(portfolio_db_pool_connections_active)", "legendFormat": "Pool active" },
            { "expr": "sum(portfolio_db_pool_connections_idle)", "legendFormat": "Pool idle" }
          ]
        },
        {
          "id": 6, "type": "timeseries", "title": "DB Query Duration Percentiles",
          "gridPos": { "x": 12, "y": 6, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "s", "color": { "mode": "palette-classic" } } },
          "targets": [
            { "expr": "histogram_quantile(0.50, sum by (le) (rate(portfolio_db_query_duration_seconds_bucket[5m])))", "legendFormat": "p50" },
            { "expr": "histogram_quantile(0.95, sum by (le) (rate(portfolio_db_query_duration_seconds_bucket[5m])))", "legendFormat": "p95" },
            { "expr": "histogram_quantile(0.99, sum by (le) (rate(portfolio_db_query_duration_seconds_bucket[5m])))", "legendFormat": "p99" }
          ]
        },
        {
          "id": 7, "type": "timeseries", "title": "Dead Tuples (indicates need for VACUUM)",
          "gridPos": { "x": 0, "y": 14, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "none", "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "sum by (relname) (pg_stat_user_tables_n_dead_tup)", "legendFormat": "{{relname}}" }]
        },
        {
          "id": 8, "type": "timeseries", "title": "Commits & Rollbacks",
          "gridPos": { "x": 12, "y": 14, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "ops", "color": { "mode": "palette-classic" } } },
          "targets": [
            { "expr": "rate(pg_stat_database_xact_commit{datname=\"portfolio_db\"}[1m])", "legendFormat": "commits/s" },
            { "expr": "rate(pg_stat_database_xact_rollback{datname=\"portfolio_db\"}[1m])", "legendFormat": "rollbacks/s" }
          ]
        },
        {
          "id": 9, "type": "timeseries", "title": "DB Errors",
          "gridPos": { "x": 0, "y": 22, "w": 12, "h": 6 },
          "fieldConfig": { "defaults": { "unit": "none", "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "sum by (type) (rate(portfolio_db_errors_total[5m]))", "legendFormat": "{{type}}" }]
        },
        {
          "id": 10, "type": "timeseries", "title": "Temp Files Written",
          "gridPos": { "x": 12, "y": 22, "w": 12, "h": 6 },
          "fieldConfig": { "defaults": { "unit": "bytes", "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "rate(pg_stat_database_temp_bytes{datname=\"portfolio_db\"}[5m])", "legendFormat": "temp bytes/s" }]
        }
      ],
      "schemaVersion": 38,
      "version": 1
    }
