apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-11-llm
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: portfolio-monitoring
    app.kubernetes.io/component: visualization
    app.kubernetes.io/managed-by: argocd
    dashboard: llm-observability
data:
  11-llm-observability.json: |
    {
      "uid": "portfolio-llm-observability",
      "title": "LLM Observability",
      "description": "Per-provider (Claude/Groq/Gemini) request outcome, latency, token usage, and estimated spend for the AI job-scoring engine. Arrives via the shared Pushgateway (jobWorker.js runs as a CronJob).",
      "tags": ["portfolio-mcs", "ai", "llm"],
      "timezone": "browser",
      "refresh": "5m",
      "time": { "from": "now-7d", "to": "now" },
      "panels": [
        {
          "id": 1, "type": "stat", "title": "Requests (24h) by Provider",
          "gridPos": { "x": 0, "y": 0, "w": 8, "h": 6 },
          "options": { "colorMode": "value", "textMode": "value_and_name" },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [{
            "expr": "sum by (provider) (increase(llm_requests_total[24h]))",
            "legendFormat": "{{provider}}",
            "instant": true
          }]
        },
        {
          "id": 2, "type": "stat", "title": "Error Rate (24h) by Provider",
          "gridPos": { "x": 8, "y": 0, "w": 8, "h": 6 },
          "options": { "colorMode": "background", "textMode": "value_and_name" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 0.1 }, { "color": "red", "value": 0.3 }] }
            }
          },
          "targets": [{
            "expr": "sum by (provider) (increase(llm_requests_total{status=\"failed\"}[24h])) / (sum by (provider) (increase(llm_requests_total[24h])) + 0.001)",
            "legendFormat": "{{provider}}",
            "instant": true
          }]
        },
        {
          "id": 3, "type": "stat", "title": "Estimated Spend Today",
          "gridPos": { "x": 16, "y": 0, "w": 8, "h": 6 },
          "options": { "colorMode": "value", "textMode": "value_and_name" },
          "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 4 } },
          "targets": [{
            "expr": "sum by (provider) (increase(llm_estimated_cost_usd_total[24h]))",
            "legendFormat": "{{provider}}",
            "instant": true
          }]
        },
        {
          "id": 4, "type": "timeseries", "title": "Request Latency by Provider (p50/p95)",
          "gridPos": { "x": 0, "y": 6, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "s", "color": { "mode": "palette-classic" } } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le, provider) (rate(llm_request_duration_seconds_bucket[6h])))",
              "legendFormat": "{{provider}} p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le, provider) (rate(llm_request_duration_seconds_bucket[6h])))",
              "legendFormat": "{{provider}} p95"
            }
          ]
        },
        {
          "id": 5, "type": "timeseries", "title": "Requests Over Time by Provider",
          "gridPos": { "x": 12, "y": 6, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "palette-classic" } } },
          "targets": [
            { "expr": "sum by (provider) (increase(llm_requests_total{status=\"success\"}[1h]))", "legendFormat": "{{provider}} success" },
            { "expr": "sum by (provider) (increase(llm_requests_total{status=\"failed\"}[1h]))", "legendFormat": "{{provider}} failed" }
          ]
        },
        {
          "id": 6, "type": "timeseries", "title": "Token Usage by Provider (prompt vs completion)",
          "gridPos": { "x": 0, "y": 14, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "palette-classic" } } },
          "targets": [{
            "expr": "sum by (provider, token_type) (increase(llm_tokens_total[1h]))",
            "legendFormat": "{{provider}} {{token_type}}"
          }]
        },
        {
          "id": 7, "type": "timeseries", "title": "Cumulative Estimated Spend (30d)",
          "gridPos": { "x": 12, "y": 14, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "currencyUSD", "color": { "mode": "palette-classic" } } },
          "targets": [{
            "expr": "sum by (provider) (llm_estimated_cost_usd_total)",
            "legendFormat": "{{provider}}"
          }],
          "time": { "from": "now-30d", "to": "now" }
        },
        {
          "id": 8, "type": "piechart", "title": "Pattern-Only vs LLM-Assisted Decisions (24h)",
          "description": "Cross-references the Job Pipeline dashboard's decision-mix metric — shows how often the ambiguous-score band actually triggers an LLM call vs. pattern scoring alone.",
          "gridPos": { "x": 0, "y": 22, "w": 12, "h": 8 },
          "options": { "pieType": "donut", "legend": { "displayMode": "table", "placement": "right" } },
          "targets": [
            { "expr": "sum(increase(llm_requests_total[24h]))", "legendFormat": "LLM-assisted" },
            { "expr": "sum(increase(jobs_filtered_total[24h])) - sum(increase(llm_requests_total[24h]))", "legendFormat": "Pattern-only" }
          ]
        },
        {
          "id": 9, "type": "table", "title": "Cost per 1K Jobs Scored, by Provider (7d)",
          "gridPos": { "x": 12, "y": 22, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 4 } },
          "targets": [{
            "expr": "1000 * sum by (provider) (increase(llm_estimated_cost_usd_total[7d])) / (sum by (provider) (increase(llm_requests_total{status=\"success\"}[7d])) + 0.001)",
            "legendFormat": "{{provider}}",
            "instant": true,
            "format": "table"
          }]
        },
        {
          "id": 10, "type": "row", "title": "Permanent Cost History (database-backed)",
          "description": "Backed by llm_requests_log (db/migrations/029_llm_requests_log.sql), not Prometheus — this survives API restarts and isn't bounded by Prometheus's 30-day retention. Compare the 30d panel here against \"Cumulative Estimated Spend (30d)\" above; they should roughly agree.",
          "gridPos": { "x": 0, "y": 30, "w": 24, "h": 1 }
        },
        {
          "id": 11, "type": "stat", "title": "All-Time Estimated Spend, by Provider",
          "gridPos": { "x": 0, "y": 31, "w": 8, "h": 6 },
          "options": { "colorMode": "value", "textMode": "value_and_name" },
          "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 4 } },
          "targets": [{
            "expr": "portfolio_llm_spend_alltime_total_cost_usd or vector(0)",
            "legendFormat": "{{provider}}",
            "instant": true
          }]
        },
        {
          "id": 12, "type": "stat", "title": "All-Time Requests, by Provider",
          "gridPos": { "x": 8, "y": 31, "w": 8, "h": 6 },
          "options": { "colorMode": "value", "textMode": "value_and_name" },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [{
            "expr": "portfolio_llm_spend_alltime_total_requests or vector(0)",
            "legendFormat": "{{provider}}",
            "instant": true
          }]
        },
        {
          "id": 13, "type": "stat", "title": "Estimated Spend (30d, DB-backed)",
          "gridPos": { "x": 16, "y": 31, "w": 8, "h": 6 },
          "options": { "colorMode": "value", "textMode": "value_and_name" },
          "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 4 } },
          "targets": [{
            "expr": "portfolio_llm_spend_30d_cost_30d or vector(0)",
            "legendFormat": "{{provider}}",
            "instant": true
          }]
        }
      ],
      "schemaVersion": 38,
      "version": 1
    }
