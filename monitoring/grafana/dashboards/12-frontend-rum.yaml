apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-12-frontend-rum
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: portfolio-monitoring
    app.kubernetes.io/component: visualization
    app.kubernetes.io/managed-by: argocd
    dashboard: frontend-rum
data:
  12-frontend-rum.json: |
    {
      "uid": "portfolio-frontend-rum",
      "title": "Frontend RUM",
      "description": "Real User Monitoring for admin-ui and user-ui — Core Web Vitals reported by real browsers via POST /api/rum, plus uncaught JS error rate.",
      "tags": ["portfolio-mcs", "frontend", "rum", "web-vitals"],
      "timezone": "browser",
      "refresh": "5m",
      "time": { "from": "now-24h", "to": "now" },
      "panels": [
        {
          "id": 1, "type": "stat", "title": "LCP p75 (Largest Contentful Paint)",
          "description": "Good < 2.5s, Needs Improvement < 4s, Poor >= 4s (Google Core Web Vitals thresholds)",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 6 },
          "options": { "colorMode": "background", "textMode": "value_and_name" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 2.5 }, { "color": "red", "value": 4 }] }
            }
          },
          "targets": [{
            "expr": "histogram_quantile(0.75, sum by (le, app) (rate(portfolio_web_vitals_seconds_bucket{metric=\"LCP\"}[24h])))",
            "legendFormat": "{{app}}",
            "instant": true
          }]
        },
        {
          "id": 2, "type": "stat", "title": "CLS p75 (Cumulative Layout Shift)",
          "description": "Good < 0.1, Needs Improvement < 0.25, Poor >= 0.25",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 6 },
          "options": { "colorMode": "background", "textMode": "value_and_name" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 0.1 }, { "color": "red", "value": 0.25 }] }
            }
          },
          "targets": [{
            "expr": "histogram_quantile(0.75, sum by (le, app) (rate(portfolio_web_vitals_seconds_bucket{metric=\"CLS\"}[24h])))",
            "legendFormat": "{{app}}",
            "instant": true
          }]
        },
        {
          "id": 3, "type": "stat", "title": "INP p75 (Interaction to Next Paint)",
          "description": "Good < 200ms, Needs Improvement < 500ms, Poor >= 500ms",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 6 },
          "options": { "colorMode": "background", "textMode": "value_and_name" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 0.2 }, { "color": "red", "value": 0.5 }] }
            }
          },
          "targets": [{
            "expr": "histogram_quantile(0.75, sum by (le, app) (rate(portfolio_web_vitals_seconds_bucket{metric=\"INP\"}[24h])))",
            "legendFormat": "{{app}}",
            "instant": true
          }]
        },
        {
          "id": 4, "type": "stat", "title": "JS Error Rate (24h)",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 6 },
          "options": { "colorMode": "value", "textMode": "value_and_name" },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [{
            "expr": "sum by (app) (increase(portfolio_frontend_errors_total[24h]))",
            "legendFormat": "{{app}}",
            "instant": true
          }]
        },
        {
          "id": 5, "type": "timeseries", "title": "LCP p75 Over Time by App",
          "gridPos": { "x": 0, "y": 6, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "s", "color": { "mode": "palette-classic" },
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 2.5 }, { "color": "red", "value": 4 }] }
            }
          },
          "targets": [{
            "expr": "histogram_quantile(0.75, sum by (le, app) (rate(portfolio_web_vitals_seconds_bucket{metric=\"LCP\"}[1h])))",
            "legendFormat": "{{app}}"
          }]
        },
        {
          "id": 6, "type": "timeseries", "title": "FCP / TTFB p75 Over Time",
          "gridPos": { "x": 12, "y": 6, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "s", "color": { "mode": "palette-classic" } } },
          "targets": [
            { "expr": "histogram_quantile(0.75, sum by (le, app) (rate(portfolio_web_vitals_seconds_bucket{metric=\"FCP\"}[1h])))", "legendFormat": "{{app}} FCP" },
            { "expr": "histogram_quantile(0.75, sum by (le, app) (rate(portfolio_web_vitals_seconds_bucket{metric=\"TTFB\"}[1h])))", "legendFormat": "{{app}} TTFB" }
          ]
        },
        {
          "id": 7, "type": "timeseries", "title": "JS Error Rate Over Time",
          "gridPos": { "x": 0, "y": 14, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "sum by (app) (increase(portfolio_frontend_errors_total[1h]))", "legendFormat": "{{app}}" }]
        },
        {
          "id": 8, "type": "table", "title": "Top Error Hashes (7d)",
          "description": "Message text isn't stored (bounded cardinality) — cross-reference the hash against browser console logs during investigation.",
          "gridPos": { "x": 12, "y": 14, "w": 12, "h": 8 },
          "options": { "sortBy": [{ "displayName": "Value", "desc": true }] },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [{
            "expr": "topk(10, sum by (app, message_hash) (increase(portfolio_frontend_errors_total[7d])))",
            "legendFormat": "{{app}} / {{message_hash}}",
            "instant": true,
            "format": "table"
          }]
        },
        {
          "id": 9, "type": "table", "title": "Slowest Routes by LCP (p75, 24h)",
          "gridPos": { "x": 0, "y": 22, "w": 24, "h": 8 },
          "options": { "sortBy": [{ "displayName": "Value", "desc": true }] },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "targets": [{
            "expr": "topk(15, histogram_quantile(0.75, sum by (le, app, route) (rate(portfolio_web_vitals_seconds_bucket{metric=\"LCP\"}[24h]))))",
            "legendFormat": "{{app}}{{route}}",
            "instant": true,
            "format": "table"
          }]
        }
      ],
      "schemaVersion": 38,
      "version": 1
    }
