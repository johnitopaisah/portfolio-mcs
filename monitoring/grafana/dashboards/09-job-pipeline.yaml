apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-09-job-pipeline
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: portfolio-monitoring
    app.kubernetes.io/component: visualization
    app.kubernetes.io/managed-by: argocd
    dashboard: job-pipeline
data:
  09-job-pipeline.json: |
    {
      "uid": "portfolio-job-pipeline",
      "title": "Job Pipeline",
      "description": "End-to-end job aggregation system: scraper/ discovery+dedup by source platform, AI filtering decisions, relevance scoring, and alert delivery. All series arrive via the shared Pushgateway (scraper and jobWorker.js both run as short-lived CronJobs).",
      "tags": ["portfolio-mcs", "jobs", "ai", "pipeline"],
      "timezone": "browser",
      "refresh": "5m",
      "time": { "from": "now-7d", "to": "now" },
      "panels": [
        {
          "id": 1, "type": "stat", "title": "New Jobs Ingested (24h)",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 6 },
          "options": { "colorMode": "value", "graphMode": "area" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "fixed", "fixedColor": "green" } } },
          "targets": [{ "expr": "sum(increase(jobs_new_total[24h]))" }]
        },
        {
          "id": 2, "type": "stat", "title": "Duplicate Rate (24h)",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 6 },
          "options": { "colorMode": "background" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 0.6 }, { "color": "red", "value": 0.85 }] }
            }
          },
          "targets": [{
            "expr": "sum(increase(jobs_duplicate_total[24h])) / (sum(increase(jobs_ingested_total[24h])) + 1)"
          }]
        },
        {
          "id": 3, "type": "stat", "title": "Active Jobs in Database",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 6 },
          "options": { "colorMode": "value" },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [{ "expr": "jobs_active_total" }]
        },
        {
          "id": 4, "type": "stat", "title": "Alert Delivery Success Rate (24h)",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 6 },
          "options": { "colorMode": "background" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": { "steps": [{ "color": "red", "value": 0 }, { "color": "yellow", "value": 0.9 }, { "color": "green", "value": 0.99 }] }
            }
          },
          "targets": [{
            "expr": "sum(increase(job_alerts_sent_total{status=\"success\"}[24h])) / (sum(increase(job_alerts_sent_total[24h])) + 0.001)"
          }]
        },
        {
          "id": 5, "type": "piechart", "title": "Jobs Ingested by Source Platform (24h)",
          "gridPos": { "x": 0, "y": 6, "w": 8, "h": 8 },
          "options": { "pieType": "donut", "legend": { "displayMode": "table", "placement": "right" } },
          "targets": [{
            "expr": "sum by (provider) (increase(jobs_ingested_total[24h]))",
            "legendFormat": "{{provider}}"
          }]
        },
        {
          "id": 6, "type": "piechart", "title": "AI Filtering Decision Mix (24h)",
          "gridPos": { "x": 8, "y": 6, "w": 8, "h": 8 },
          "options": { "pieType": "donut", "legend": { "displayMode": "table", "placement": "right" } },
          "targets": [{
            "expr": "sum by (decision) (increase(jobs_filtered_total[24h]))",
            "legendFormat": "{{decision}}"
          }]
        },
        {
          "id": 7, "type": "barchart", "title": "Alerts Sent by Channel (24h)",
          "gridPos": { "x": 16, "y": 6, "w": 8, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [{
            "expr": "sum by (channel) (increase(job_alerts_sent_total[24h]))",
            "legendFormat": "{{channel}}"
          }]
        },
        {
          "id": 8, "type": "timeseries", "title": "Ingestion Duration by Platform (p50/p95)",
          "gridPos": { "x": 0, "y": 14, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "s", "color": { "mode": "palette-classic" } } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le, provider) (rate(job_ingestion_duration_seconds_bucket[6h])))",
              "legendFormat": "{{provider}} p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le, provider) (rate(job_ingestion_duration_seconds_bucket[6h])))",
              "legendFormat": "{{provider}} p95"
            }
          ]
        },
        {
          "id": 9, "type": "timeseries", "title": "AI Filtering Duration per Job (p50/p95)",
          "gridPos": { "x": 12, "y": 14, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "s", "color": { "mode": "palette-classic" } } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le) (rate(ai_filtering_duration_seconds_bucket[6h])))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(ai_filtering_duration_seconds_bucket[6h])))",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "id": 10, "type": "heatmap", "title": "Job Relevance Score Distribution",
          "gridPos": { "x": 0, "y": 22, "w": 16, "h": 8 },
          "options": { "calculate": false },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [{
            "expr": "sum by (le) (increase(job_relevance_score_bucket[6h]))",
            "format": "heatmap",
            "legendFormat": "{{le}}"
          }]
        },
        {
          "id": 11, "type": "timeseries", "title": "Alert Delivery Duration by Channel (p95)",
          "gridPos": { "x": 16, "y": 22, "w": 8, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "s", "color": { "mode": "palette-classic" } } },
          "targets": [{
            "expr": "histogram_quantile(0.95, sum by (le, channel) (rate(job_alerts_duration_seconds_bucket[6h])))",
            "legendFormat": "{{channel}}"
          }]
        },
        {
          "id": 12, "type": "timeseries", "title": "New vs Duplicate Jobs Over Time (by platform)",
          "gridPos": { "x": 0, "y": 30, "w": 24, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "palette-classic" } } },
          "targets": [
            { "expr": "sum by (provider) (increase(jobs_new_total[1h]))", "legendFormat": "{{provider}} new" },
            { "expr": "sum by (provider) (increase(jobs_duplicate_total[1h]))", "legendFormat": "{{provider}} duplicate" }
          ]
        }
      ],
      "schemaVersion": 38,
      "version": 1
    }
