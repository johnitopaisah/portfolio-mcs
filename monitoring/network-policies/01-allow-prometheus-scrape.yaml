# Allows Prometheus (in monitoring namespace) to scrape:
#   - portfolio-api pods on port 4000 (/metrics)
# And allows postgres-exporter (in monitoring namespace) to reach:
#   - portfolio-db on port 5432
#
# This is a NetworkPolicy in the PORTFOLIO namespace that opens
# ingress from the monitoring namespace.
# NOTE: Minikube with kindnet CNI does not enforce NetworkPolicy.
# Apply Calico CNI to enable enforcement.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: portfolio
  labels:
    app: portfolio-mcs
spec:
  podSelector: {}   # applies to ALL pods in portfolio namespace
  policyTypes:
    - Ingress
  ingress:
    # Allow Prometheus to scrape API /metrics on port 4000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4000
    # Allow postgres-exporter to connect to DB on port 5432
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 5432
