# ============================================================
#  Portfolio MCS — Local Development
# ============================================================

networks:
  portfolio:
    driver: bridge

volumes:
  postgres_data:

services:

  # ── Database ────────────────────────────────────────────────
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: portfolio-db
    restart: unless-stopped
    networks: [portfolio]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-portfolio_db}
      POSTGRES_USER:     ${POSTGRES_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      ADMIN_PASSWORD_HASH:     ${ADMIN_PASSWORD_HASH}
      ADMIN_PROFILE_NAME:      ${ADMIN_PROFILE_NAME:-John Itopa ISAH}
      ADMIN_PROFILE_HEADLINE:  ${ADMIN_PROFILE_HEADLINE:-DevOps & Cloud Engineer}
      ADMIN_PROFILE_BIO:       ${ADMIN_PROFILE_BIO:-Engineering graduate specialising in cloud infrastructure, Kubernetes, and scalable distributed systems.}
      ADMIN_PROFILE_EMAIL:     ${ADMIN_PROFILE_EMAIL:-admin@example.com}
      ADMIN_PROFILE_GITHUB:    ${ADMIN_PROFILE_GITHUB:-https://github.com/johnitopaisah}
      ADMIN_PROFILE_LINKEDIN:  ${ADMIN_PROFILE_LINKEDIN:-https://linkedin.com/in/johnitopaisah}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio_user} -d ${POSTGRES_DB:-portfolio_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── API ─────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: portfolio-api
    restart: unless-stopped
    networks: [portfolio]
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:        development
      PORT:            4000
      DATABASE_URL:    postgres://${POSTGRES_USER:-portfolio_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@db:5432/${POSTGRES_DB:-portfolio_db}
      JWT_SECRET:      ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRES_IN:  ${JWT_EXPIRES_IN:-7d}
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      SITE_URL:           ${SITE_URL:-http://localhost:3000}
      ADMIN_URL:          ${ADMIN_URL:-http://localhost:3001}
      NOTIFY_EMAIL_USER:  ${NOTIFY_EMAIL_USER:-}
      NOTIFY_EMAIL_PASS:  ${NOTIFY_EMAIL_PASS:-}
      NOTIFY_EMAIL_TO:    ${NOTIFY_EMAIL_TO:-}
      IMAP_HOST:          ${IMAP_HOST:-}
      IMAP_PORT:          ${IMAP_PORT:-993}
      IMAP_USER:          ${IMAP_USER:-}
      IMAP_PASSWORD:      ${IMAP_PASSWORD:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN:  ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM:        ${TWILIO_FROM:-}
      TWILIO_TO:          ${TWILIO_TO:-}
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY:       ${GROQ_API_KEY:-}
      GEMINI_API_KEY:     ${GEMINI_API_KEY:-}
      MEDIUM_USERNAME:        ${MEDIUM_USERNAME:-}
      MEDIUM_FEED_URL:        ${MEDIUM_FEED_URL:-}
      LINKEDIN_CLIENT_ID:     ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      LINKEDIN_REDIRECT_URI:  ${LINKEDIN_REDIRECT_URI:-http://localhost:4000/api/admin/linkedin/callback}
      ADMIN_UI_URL:           ${ADMIN_UI_URL:-http://localhost:3001}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── User UI ─────────────────────────────────────────────────
  user-ui:
    build:
      context: ./user-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        INTERNAL_API_URL:    http://api:4000
    container_name: portfolio-user-ui
    restart: unless-stopped
    networks: [portfolio]
    depends_on:
      api:
        condition: service_healthy
    environment:
      # NEXT_PUBLIC_API_URL is baked at build time — listed here for documentation only
      NEXT_PUBLIC_API_URL: http://localhost:4000
      # INTERNAL_API_URL is read at runtime by middleware — must be the Docker service name
      INTERNAL_API_URL:    http://api:4000
      PORT:                3000
    ports:
      - "3000:3000"

  # ── Admin UI ────────────────────────────────────────────────
  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        INTERNAL_API_URL:    http://api:4000
    container_name: portfolio-admin-ui
    restart: unless-stopped
    networks: [portfolio]
    depends_on:
      api:
        condition: service_healthy
    environment:
      # NEXT_PUBLIC_API_URL is baked at build time — listed here for documentation only
      NEXT_PUBLIC_API_URL: http://localhost:4000
      # INTERNAL_API_URL is read at runtime by middleware — must be the Docker service name
      INTERNAL_API_URL:    http://api:4000
      PORT:                3001
    ports:
      - "3001:3001"
