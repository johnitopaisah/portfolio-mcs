apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-backup
  namespace: argocd
  labels:
    app.kubernetes.io/name: portfolio-backup
    app.kubernetes.io/part-of: portfolio-mcs
    app.kubernetes.io/component: backup
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"   # after DB and API services are up
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: portfolio-mcs
  source:
    repoURL: https://github.com/johnitopaisah/portfolio-mcs
    targetRevision: develop
    path: k8s/backup
    directory:
      exclude: "*.md,*.mk"   # docs and the optional Makefile targets aren't manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: backup
  syncPolicy:
    automated:
      selfHeal: true
      prune: false     # never auto-delete completed/failed Job run history
    syncOptions:
      - CreateNamespace=false
