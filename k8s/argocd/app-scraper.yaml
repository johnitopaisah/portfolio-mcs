apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-scraper
  namespace: argocd
  labels:
    app.kubernetes.io/name: portfolio-scraper
    app.kubernetes.io/part-of: portfolio-mcs
    app.kubernetes.io/component: scraper
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"   # after DB and API services are up
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: portfolio-mcs
  source:
    repoURL: https://github.com/johnitopaisah/portfolio-mcs
    targetRevision: develop
    path: k8s/scraper
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=false
