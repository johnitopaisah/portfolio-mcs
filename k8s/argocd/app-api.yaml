apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-api
  namespace: argocd
  labels:
    app.kubernetes.io/name: portfolio-api
    app.kubernetes.io/part-of: portfolio-mcs
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: portfolio-mcs
  source:
    repoURL: https://github.com/johnitopaisah/portfolio-mcs
    targetRevision: develop
    path: k8s/api
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio
  syncPolicy:
    automated:
      selfHeal: true   # reverts manual kubectl changes
      prune: true      # removes resources deleted from git
    syncOptions:
      - CreateNamespace=false
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: portfolio-api
      jsonPointers:
        - /spec/replicas   # HPA owns this at runtime
