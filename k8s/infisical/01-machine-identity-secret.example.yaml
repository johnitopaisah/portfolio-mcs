# ============================================================
#  EXAMPLE ONLY — never commit real values to git.
#
#  This is the ONE secret you create manually with kubectl.
#  The Infisical operator uses these credentials to authenticate
#  with Infisical and pull all other secrets automatically.
#
#  Step 1: Create a Machine Identity in Infisical:
#    Infisical dashboard → Project → Access Control → Machine Identities
#    → Add Identity → Universal Auth → copy Client ID and Client Secret
#
#  Step 2: Create this secret on the cluster:
#
#    kubectl create secret generic infisical-machine-identity \
#      --namespace portfolio \
#      --from-literal=clientId=YOUR_CLIENT_ID \
#      --from-literal=clientSecret=YOUR_CLIENT_SECRET
#
#  This secret is referenced by the InfisicalSecret CRD in 02-infisical-secret.yaml.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: infisical-machine-identity
  namespace: portfolio
  labels:
    app: portfolio-mcs
type: Opaque
stringData:
  clientId:     "REPLACE_ME"
  clientSecret: "REPLACE_ME"
