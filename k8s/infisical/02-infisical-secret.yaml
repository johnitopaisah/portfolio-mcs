# ============================================================
#  InfisicalSecret — pulls secrets from Infisical and creates
#  the portfolio-secrets Kubernetes Secret automatically.
#
#  Prerequisites:
#    1. Infisical operator installed on the cluster:
#       kubectl apply -f https://raw.githubusercontent.com/Infisical/infisical/main/k8-operator/config/install/install.yaml
#
#    2. Machine identity secret created (see 01-machine-identity-secret.example.yaml)
#
#    3. Your Infisical project must contain ALL the keys listed in
#       secrets/01-app-secret.example.yaml
#
#  The operator polls Infisical every 60 seconds and keeps the
#  K8s Secret in sync. Secret rotations are picked up automatically.
#
#  To find your projectId:
#    Infisical dashboard → Project Settings → Project ID (copy the UUID)
#
#  Environment slugs: "dev", "staging", "prod" (or your custom slug)
# ============================================================
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: portfolio-infisical-secret
  namespace: portfolio
  labels:
    app: portfolio-mcs
spec:
  hostAPI: https://app.infisical.com/api   # change if self-hosting Infisical

  resyncInterval: 60   # seconds between polls

  authentication:
    universalAuth:
      secretsScope:
        projectSlug:      "portfolio-mcs"   # ← Infisical project slug
        envSlug:          "dev"            # ← environment: dev | staging | prod
        secretsPath:      "/"              # root path — all secrets in that env
      credentialsRef:
        secretName:      infisical-machine-identity
        secretNamespace: portfolio

  managedSecretReference:
    secretName:      portfolio-secrets   
    secretNamespace: portfolio
    creationPolicy:  Orphan              # keep the K8s Secret if this CRD is deleted
