apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-config
  namespace: portfolio
  labels:
    app: portfolio-mcs
data:
  # API runtime config
  NODE_ENV: production
  API_PORT: '4000'

  # CORS — production domains only, no localhost
  ALLOWED_ORIGINS: https://johnisah.com,https://admin.johnisah.com

  # Admin UI base URL — used by API to build password reset links in emails
  ADMIN_URL: https://admin.johnisah.com

  # Internal service name — used by Next.js SSR at runtime for server-side fetches.
  # NOTE: NEXT_PUBLIC_API_URL is a BUILD-TIME arg baked into the image by the CI
  # pipeline and cannot be changed here at runtime. This ConfigMap entry is for
  # documentation only. The INTERNAL_API_URL below IS read at runtime.
  NEXT_PUBLIC_API_URL: https://api.johnisah.com
  INTERNAL_API_URL: http://portfolio-api:4000

  # Next.js
  NEXT_TELEMETRY_DISABLED: '1'