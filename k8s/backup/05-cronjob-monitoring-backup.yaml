# ============================================================
#  CronJob — Monitoring Data Backup
#  Backs up Prometheus time-series data and Grafana configuration
#  Runs daily at 04:00 UTC, streaming straight to GCS (no local PVC).
#
#  Runs backup-monitoring.sh from the shared ConfigMap rather than
#  duplicating the logic inline, so there's one copy of the script to keep
#  in sync, not two.
# ============================================================

apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-monitoring-volumes
  namespace: backup
  labels:
    app: portfolio-mcs
    component: backup
spec:
  schedule: "0 4 * * *"

  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  suspend: false

  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: portfolio-mcs
            component: backup
          annotations:
            description: "Portfolio monitoring volumes daily backup (Prometheus + Grafana) -> GCS"
        spec:
          serviceAccountName: backup-serviceaccount
          restartPolicy: OnFailure
          terminationGracePeriodSeconds: 120

          # Not runAsNonRoot: `gcloud components install kubectl` needs to
          # write into the SDK's own install directory, which is root-owned
          # in this image. Same tradeoff as the DB backup job — short-lived,
          # one-shot batch pod, not a long-running service.

          containers:
            - name: backup
              image: google/cloud-sdk:slim
              imagePullPolicy: IfNotPresent

              command: ["/bin/bash"]
              args:
                - -c
                - |
                  set -e
                  gcloud components install kubectl --quiet
                  source /scripts/backup-monitoring.sh

              env:
                - name: HOME
                  value: /tmp

              resources:
                requests:
                  cpu: "200m"
                  memory: "512Mi"
                limits:
                  cpu: "1000m"
                  memory: "1Gi"

              volumeMounts:
                - name: backup-scripts
                  mountPath: /scripts
                  readOnly: true

              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                # Not dropping capabilities: apt/gcloud's package installers
                # internally de-escalate via setuid/setgid — even as root,
                # that needs CAP_SETUID/CAP_SETGID. `drop: [ALL]` broke that.

          volumes:
            - name: backup-scripts
              configMap:
                name: db-backup-scripts
                defaultMode: 0755
