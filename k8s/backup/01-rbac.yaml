# ============================================================
#  RBAC — Backup Service Account
#
#  DB backup needs no special Kubernetes permissions: it connects to
#  Postgres directly with credentials from its own namespace's secret
#  (see 01-infisical-secret.yaml) and uploads straight to GCS, authenticating
#  as the VM's own service account via the metadata server — no k8s RBAC
#  involved in either of those.
#
#  The monitoring backup DOES need real permissions: it execs into the
#  Prometheus/Grafana pods (in the "monitoring" namespace) to tar their
#  data. That's a Role + RoleBinding scoped to the monitoring namespace,
#  with a cross-namespace subject — not a ClusterRole with an inline
#  "namespaces:" filter, which isn't a field the Kubernetes RBAC API
#  actually has (the previous version of this file used one; it either
#  gets silently ignored or fails validation on apply, and even ignored
#  it wouldn't scope anything — a ClusterRole+ClusterRoleBinding is
#  inherently cluster-wide regardless).
# ============================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-serviceaccount
  namespace: backup
  labels:
    app: portfolio-mcs
    component: backup

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup-monitoring-exec
  namespace: monitoring
  labels:
    app: portfolio-mcs
    component: backup
rules:
  # List/describe pods and PVCs to find the Prometheus/Grafana pod and
  # confirm their volumes exist before attempting a backup.
  - apiGroups: [""]
    resources: ["pods", "persistentvolumeclaims"]
    verbs: ["get", "list"]
  # Exec into those pods to run `tar` against their mounted data.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Restore needs to restart Grafana after writing its data back so it
  # reloads dashboards from the restored SQLite DB.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup-monitoring-exec
  namespace: monitoring
  labels:
    app: portfolio-mcs
    component: backup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backup-monitoring-exec
subjects:
  - kind: ServiceAccount
    name: backup-serviceaccount
    namespace: backup
