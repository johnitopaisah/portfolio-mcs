# ============================================================
#  CronJob — Database Backup Job
#  Runs daily at 02:00 UTC. Streams pg_dump straight to GCS — no local
#  file, no PVC. DB credentials come from backup-db-secrets (synced into
#  this namespace by 02-infisical-secret.yaml), not a cross-namespace
#  reference to portfolio-secrets, which Kubernetes secrets can't do.
# ============================================================

apiVersion: batch/v1
kind: CronJob
metadata:
  name: portfolio-db-backup
  namespace: backup
  labels:
    app: portfolio-mcs
    component: backup
spec:
  schedule: "0 2 * * *"

  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  suspend: false

  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 3

      template:
        metadata:
          labels:
            app: portfolio-mcs
            component: backup
          annotations:
            description: "Portfolio database daily backup -> GCS"
        spec:
          serviceAccountName: backup-serviceaccount
          restartPolicy: OnFailure
          terminationGracePeriodSeconds: 60

          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            fsGroup: 65532

          initContainers:
            - name: check-db
              image: google/cloud-sdk:slim
              command:
                - sh
                - -c
                - |
                  apt-get update -qq && apt-get install -y -qq postgresql-client
                  echo "Checking database connectivity..."
                  until pg_isready -h portfolio-db.portfolio.svc.cluster.local -p 5432; do
                    echo "Waiting for database..."
                    sleep 5
                  done
                  echo "Database is ready"
              resources:
                requests:
                  cpu: "50m"
                  memory: "128Mi"
                limits:
                  cpu: "200m"
                  memory: "256Mi"

          containers:
            - name: backup
              image: google/cloud-sdk:slim
              imagePullPolicy: IfNotPresent

              command: ["/bin/bash"]
              args:
                - -c
                - |
                  apt-get update -qq && apt-get install -y -qq postgresql-client
                  source /scripts/backup.sh

              env:
                - name: HOME
                  value: /tmp
                - name: POSTGRES_HOST
                  value: "portfolio-db.portfolio.svc.cluster.local"
                - name: POSTGRES_PORT
                  value: "5432"
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: backup-db-secrets
                      key: POSTGRES_DB
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: backup-db-secrets
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: backup-db-secrets
                      key: POSTGRES_PASSWORD

              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"

              volumeMounts:
                - name: backup-scripts
                  mountPath: /scripts
                  readOnly: true

              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL

          volumes:
            - name: backup-scripts
              configMap:
                name: db-backup-scripts
                defaultMode: 0755
