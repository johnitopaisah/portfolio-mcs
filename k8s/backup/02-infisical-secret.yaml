# ============================================================
#  InfisicalSecret — syncs the same DB credentials portfolio-secrets
#  already has into a Secret local to the "backup" namespace.
#
#  Why this is needed: Kubernetes secrets are namespace-scoped — a Pod's
#  env.valueFrom.secretKeyRef can only resolve a Secret in its OWN
#  namespace, no exception, regardless of RBAC. The DB backup CronJob runs
#  here in "backup", not in "portfolio" where portfolio-secrets lives, so
#  it needs its own synced copy rather than trying to reference the
#  original across namespaces (which silently can't work).
#
#  credentialsRef below points at the machine-identity secret that
#  already exists in "portfolio" — reusing it rather than duplicating it,
#  since secretNamespace is an explicit, independent field from this
#  resource's own namespace.
# ============================================================
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: backup-infisical-secret
  namespace: backup
  labels:
    app: portfolio-mcs
    component: backup

spec:
  hostAPI: https://app.infisical.com/api

  resyncInterval: 60

  authentication:
    universalAuth:
      secretsScope:
        projectSlug:  "portfolio-mcs-pds-f"
        envSlug:      "dev"
        secretsPath:  "/"
      credentialsRef:
        secretName:      infisical-machine-identity
        secretNamespace: portfolio

  managedSecretReference:
    secretName:      backup-db-secrets
    secretNamespace: backup
    creationPolicy:  Orphan
