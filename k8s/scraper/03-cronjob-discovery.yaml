# ============================================================
#  Scraper Discovery Worker — Kubernetes CronJob
#  Runs daily: search discovery (SearXNG) → poll known ATS
#  boards (Greenhouse/Lever/Ashby) → LinkedIn lead capture →
#  dedup/filter → store into jobs_raw.
#
#  Daily, not every-few-hours: postings don't churn that fast,
#  and this keeps discovery well within SearXNG's underlying
#  search-engine rate limits (see AGENTS notes on the incident
#  that motivated this cadence).
#
#  Coexists with job-ingestion-worker (k8s/jobs/) — the old
#  job-board sources keep running untouched until this pipeline
#  has proven itself in production.
# ============================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: portfolio-scraper
  namespace: portfolio
  labels:
    app: portfolio-mcs
    component: scraper

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: scraper-discovery
  namespace: portfolio
  labels:
    app: portfolio-mcs
    component: scraper
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 1
  suspend: false
  concurrencyPolicy: Forbid

  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800  # 30 min hard limit
      template:
        metadata:
          labels:
            app: portfolio-mcs
            component: scraper
        spec:
          restartPolicy: Never
          serviceAccountName: portfolio-scraper
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001

          imagePullSecrets:
            - name: ghcr-pull-secret

          containers:
          - name: scraper
            image: ghcr.io/johnitopaisah/portfolio-mcs/scraper:v0.1.11
            imagePullPolicy: Always
            command: ["node", "index.js"]
            securityContext:
              runAsNonRoot: true
              runAsUser: 1001
              runAsGroup: 1001
              allowPrivilegeEscalation: false

            env:
            - name: NODE_ENV
              value: "production"

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: DATABASE_URL

            # In-cluster SearXNG Service — not a secret, just an internal DNS name.
            - name: SEARXNG_URL
              value: "http://searxng:8080"

            resources:
              requests:
                cpu:    100m
                memory: 128Mi
              limits:
                cpu:    300m
                memory: 256Mi
