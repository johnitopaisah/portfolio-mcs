apiVersion: v1
kind: Service
metadata:
  name: portfolio-user-ui
  namespace: portfolio
  labels:
    app: portfolio-mcs
    component: user-ui
spec:
  type: ClusterIP
  selector:
    app: portfolio-mcs
    component: user-ui
  ports:
    - name:       http
      port:       3000
      targetPort: 3000
      protocol:   TCP
