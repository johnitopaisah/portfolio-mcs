# Headless service — gives the StatefulSet pod a stable DNS name.
# The API connects using host: portfolio-db (resolves to the pod directly).
apiVersion: v1
kind: Service
metadata:
  name: portfolio-db
  namespace: portfolio
  labels:
    app: portfolio-mcs
    component: database
spec:
  clusterIP: None   # headless — required for StatefulSet stable DNS
  selector:
    app: portfolio-mcs
    component: database
  ports:
    - name:       postgres
      port:       5432
      targetPort: 5432
      protocol:   TCP
