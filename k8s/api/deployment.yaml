apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-api
  namespace: portfolio
  labels:
    app: portfolio-mcs
    component: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: portfolio-mcs
      component: api
  template:
    metadata:
      labels:
        app: portfolio-mcs
        component: api
      annotations:
        # ── Prometheus autodiscovery ──────────────────────────
        # Prometheus is configured with kubernetes_sd_configs and will
        # scrape any pod carrying these three annotations automatically.
        prometheus.io/scrape: "true"
        prometheus.io/port:   "4000"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: portfolio-api
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001

      imagePullSecrets:
        - name: ghcr-pull-secret

      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -zv portfolio-db 5432; do
                echo "waiting for portfolio-db:5432 …"
                sleep 3
              done
              echo "DB is ready"
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"

      containers:
        - name: api
          image: ghcr.io/johnitopaisah/portfolio-mcs/api:v0.1.11-rc6
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
            - name: metrics
              containerPort: 4000
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001

          volumeMounts:
            # Puppeteer/Chromium writes temp Chrome profiles here.
            # emptyDir keeps readOnlyRootFilesystem: true intact on
            # the rest of the filesystem while giving /tmp a writable surface.
            - name: tmp
              mountPath: /tmp

          envFrom:
            - configMapRef:
                name: portfolio-config-api
            - secretRef:
                name: portfolio-secrets

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "400m"
              memory: "400Mi"

          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 60
            timeoutSeconds: 3
            failureThreshold: 2

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]

      volumes:
        - name: tmp
          emptyDir: {}
