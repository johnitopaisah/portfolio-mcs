apiVersion: v1
kind: Service
metadata:
  name: portfolio-api
  namespace: portfolio
  labels:
    app: portfolio-mcs
    component: api
spec:
  type: ClusterIP
  selector:
    app: portfolio-mcs
    component: api
  ports:
    - name:       http
      port:       4000
      targetPort: 4000
      protocol:   TCP
