# #  85% ceiling:      10,200m CPU  |  27,852Mi memory
# #
# #  Portfolio peak (rolling update + job + backup CronJobs simultaneous):
# #    requests.cpu:    ~1,430m
# #    requests.memory: ~2,496Mi
# #    limits.cpu:      ~5,900m
# #    limits.memory:   ~5,792Mi
# #    pods:            ~12
# #
# #  Quota = peak × 1.5 growth factor, verified against cluster 85% ceiling.
# #  Cluster utilisation at quota maximum: ~42% CPU, ~27% memory — safe.
# # ============================================================

