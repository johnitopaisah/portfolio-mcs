---
# ============================================================
#  Follow-up Reminder Worker — Kubernetes CronJob
#  Runs daily at 08:00 UTC: find stale APPLIED applications
#  with no response after 7 days and send follow-up reminders.
# ============================================================

apiVersion: batch/v1
kind: CronJob
metadata:
  name: followup-reminder-worker
  namespace: portfolio
  labels:
    app: portfolio-mcs
    component: followup-reminder
spec:
  schedule: "0 8 * * *"           # daily at 08:00 UTC
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 1
  suspend: false
  concurrencyPolicy: Forbid

  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300   # 5 min max
      template:
        metadata:
          labels:
            app: portfolio-mcs
            component: followup-reminder
        spec:
          restartPolicy: Never
          serviceAccountName: job-worker
          securityContext:
            fsGroup: 1001

          imagePullSecrets:
            - name: ghcr-pull-secret

          containers:
          - name: worker
            image: ghcr.io/johnitopaisah/portfolio-mcs/api:latest
            imagePullPolicy: Always
            command: ["node", "src/workers/followUpWorker.js"]
            securityContext:
              runAsNonRoot: true
              runAsUser: 1001
              runAsGroup: 1001
              allowPrivilegeEscalation: false

            env:
            # ── Runtime ────────────────────────────────────────
            - name: NODE_ENV
              value: "production"

            # ── Database ───────────────────────────────────────
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: DATABASE_URL

            # ── LLM scoring (optional — not used by this worker) ─
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: GROQ_API_KEY
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: GEMINI_API_KEY
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true

            # ── Notifications (Zoho SMTP) ──────────────────────
            - name: NOTIFY_SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: NOTIFY_SMTP_HOST
                  optional: true
            - name: NOTIFY_SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: NOTIFY_SMTP_PORT
                  optional: true
            - name: NOTIFY_EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: NOTIFY_EMAIL_USER
                  optional: true
            - name: NOTIFY_EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: NOTIFY_EMAIL_PASS
                  optional: true
            - name: NOTIFY_EMAIL_TO
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: NOTIFY_EMAIL_TO
                  optional: true

            resources:
              requests:
                cpu:    50m
                memory: 64Mi
              limits:
                cpu:    200m
                memory: 128Mi
