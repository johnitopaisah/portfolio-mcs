---
# ============================================================
#  Job Worker ConfigMap — updated for Claude Haiku (no OpenAI)
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: job-worker-config
  namespace: portfolio
  labels:
    app: portfolio-mcs
    component: job-ingestion
data:
  # Polling
  poll-interval-minutes: "15"

  # AI filtering — set false to disable Claude calls (pattern-only mode)
  # The ANTHROPIC_API_KEY secret being present also enables it independently
  use-llm-filtering: "true"

  # Advanced
  max-jobs-per-run: "100"    # reduced from 500 — we now have 3 providers
  job-ttl-hours:    "720"    # 30 days
  min-relevance-score: "65"  # lowered from 70 to surface more REVIEW-band jobs

---
# ============================================================
#  Job API Secrets — OpenAI removed, Anthropic added
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: job-api-secrets
  namespace: portfolio
  labels:
    app: portfolio-mcs
    component: job-ingestion
type: Opaque

stringData:
  # ── Job source API keys ──────────────────────────────────
  jooble-api-key:   "YOUR_JOOBLE_API_KEY_HERE"        # https://jooble.org/api/about
  remote-ok-api-key: "public"                          # RemoteOK is free, no key needed
  adzuna-app-id:    "YOUR_ADZUNA_APP_ID_HERE"          # https://developer.adzuna.com
  adzuna-api-key:   "YOUR_ADZUNA_API_KEY_HERE"

  # ── AI scoring ────────────────────────────────────────────
  # Claude Haiku — replaces OpenAI GPT-4 Turbo (~20× cheaper, same accuracy)
  # Get key from: https://console.anthropic.com/
  anthropic-api-key: "sk-ant-YOUR_KEY_HERE"
