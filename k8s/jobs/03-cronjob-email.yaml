---
# ============================================================
#  Email Tracking Worker — Kubernetes CronJob
#  Runs every 30 minutes: fetch Gmail → classify → match → update
# ============================================================

apiVersion: batch/v1
kind: CronJob
metadata:
  name: email-tracking-worker
  namespace: portfolio
  labels:
    app: portfolio-mcs
    component: email-tracking
spec:
  schedule: "*/30 * * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 1
  suspend: false
  concurrencyPolicy: Forbid

  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600   # 10 min max
      template:
        metadata:
          labels:
            app: portfolio-mcs
            component: email-tracking
            app.kubernetes.io/name: email-tracking-worker
        spec:
          restartPolicy: Never
          serviceAccountName: job-worker
          securityContext:
            fsGroup: 1001

          imagePullSecrets:
            - name: ghcr-pull-secret

          containers:
          - name: worker
            image: ghcr.io/johnitopaisah/portfolio-mcs/api:latest
            imagePullPolicy: Always
            command: ["node", "src/workers/emailWorker.js"]
            securityContext:
              runAsNonRoot: true
              runAsUser: 1001
              runAsGroup: 1001
              allowPrivilegeEscalation: false

            env:
            # ── Runtime ────────────────────────────────────────
            - name: NODE_ENV
              value: "production"

            # ── Database ───────────────────────────────────────
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: DATABASE_URL

            # ── AI classification (Anthropic Haiku) ────────────
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: ANTHROPIC_API_KEY

            # ── Gmail OAuth ────────────────────────────────────
            - name: GMAIL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: GMAIL_CLIENT_ID
            - name: GMAIL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: GMAIL_CLIENT_SECRET
            - name: GMAIL_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: GMAIL_REDIRECT_URI
            - name: GMAIL_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: GMAIL_REFRESH_TOKEN
            - name: GMAIL_TARGET_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: GMAIL_TARGET_ADDRESS

            # ── Second mailbox via IMAP (reuses NOTIFY_EMAIL_* creds —
            #    notify.js already authenticates to this same mailbox via SMTP) ──
            - name: IMAP_HOST
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: IMAP_HOST
            - name: IMAP_PORT
              value: "993"
            - name: NOTIFY_EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: NOTIFY_EMAIL_USER
            - name: NOTIFY_EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: NOTIFY_EMAIL_PASS

            resources:
              requests:
                cpu:    100m
                memory: 128Mi
              limits:
                cpu:    400m
                memory: 256Mi
