apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-admin-ui
  namespace: portfolio
  labels:
    app: portfolio-mcs
    component: admin-ui
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: portfolio-mcs
      component: admin-ui
  template:
    metadata:
      labels:
        app: portfolio-mcs
        component: admin-ui
    spec:
      serviceAccountName: portfolio-admin-ui
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
        runAsGroup:   1001

      imagePullSecrets:
        - name: ghcr-pull-secret

      initContainers:
        - name:  wait-for-api
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -zv portfolio-api 4000; do
                echo "waiting for portfolio-api:4000 …"
                sleep 3
              done
              echo "API is ready"
          resources:
            requests:
              cpu:    "10m"
              memory: "16Mi"
            limits:
              cpu:    "50m"
              memory: "32Mi"

      containers:
        - name:            admin-ui
          image:           ghcr.io/johnitopaisah/portfolio-mcs/admin-ui:v0.0.9-rc6
          imagePullPolicy: Always

          ports:
            - name:          http
              containerPort: 3001
              protocol:      TCP

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   false  # Next.js writes to .next/cache at runtime
            runAsNonRoot:             true
            runAsUser:                1001
          
          envFrom:
            - configMapRef:
                name: portfolio-config-admin-ui
          env:
            - name: ADMIN_URL
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key:  ADMIN_URL

          resources:
            requests:
              cpu:    "50m"
              memory: "128Mi"
            limits:
              cpu:    "250m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path:   /
              port:   3001
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds:       15
            timeoutSeconds:       5
            failureThreshold:     3

          readinessProbe:
            httpGet:
              path:   /
              port:   3001
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds:        5
            timeoutSeconds:        3
            failureThreshold:      2

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
