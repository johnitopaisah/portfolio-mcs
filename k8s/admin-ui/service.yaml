apiVersion: v1
kind: Service
metadata:
  name: portfolio-admin-ui
  namespace: portfolio
  labels:
    app: portfolio-mcs
    component: admin-ui
spec:
  type: ClusterIP
  selector:
    app: portfolio-mcs
    component: admin-ui
  ports:
    - name:       http
      port:       3001
      targetPort: 3001
      protocol:   TCP
